<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="图片/感知起源图标.png">
    <title>技术交流 · 感知起源 | Sensing Origin Tech Exchange</title>
    <meta name="description" content="感知起源技术交流——视频分享、技术演示与SAR载荷产品展示。">
    <!-- Video.js CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet"></noscript>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;min-height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:#03050a;color:#e0e4ee;line-height:1.6;min-height:100%;overflow-x:hidden;position:relative;transition:background .4s,color .4s}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(ellipse at 20% 20%,rgba(74,158,255,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(74,158,255,.02) 0%,transparent 50%);pointer-events:none;z-index:-1;transition:opacity .4s}
    body.light-theme::before{opacity:0}
    ::selection{background:rgba(0,123,255,0.3)}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0e1a}
    ::-webkit-scrollbar-thumb{background:#1a3a5a;border-radius:3px}
    body.light-theme ::-webkit-scrollbar-track{background:#eef1f5}
    body.light-theme ::-webkit-scrollbar-thumb{background:#b0b8c8}
    body.light-theme{background:#f5f7fa;color:#1a2a3a}
    body.light-theme .page-loader{background:#f5f7fa}
    body.light-theme nav{background:rgba(245,247,250,.95);border-bottom-color:rgba(0,0,0,.06)}
    body.light-theme .nav-logo-text .zh{color:#1a2a3a}
    body.light-theme .nav-back{color:#5a6a7a}
    body.light-theme .nav-back:hover{color:#4a9eff}
    body.light-theme .page-header .sub{color:#5a6a7a}
    body.light-theme .video-grid{background:transparent}
    body.light-theme .video-card .card-title{color:#1a2a3a}
    body.light-theme .video-card .card-meta{color:#5a6a7a}
    body.light-theme .video-card:hover .card-title{color:#4a9eff}
    body.light-theme .detail-header .video-title{color:#1a2a3a}
    body.light-theme .detail-header .video-desc{color:#5a6a7a}
    body.light-theme .detail-header .back-btn{color:#5a6a7a;border-color:rgba(0,0,0,.1)}
    body.light-theme .detail-header .back-btn:hover{color:#4a9eff;border-color:#4a9eff}
    body.light-theme .theme-toggle{background:rgba(74,158,255,.2);border-color:rgba(74,158,255,.3)}
    body.light-theme .lang-toggle{background:rgba(74,158,255,.2);border-color:rgba(74,158,255,.3)}
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(3,5,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(74,158,255,.1);padding:14px 0;transition:background .4s,border .4s}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 24px}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo-icon{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0}
    .nav-logo-icon img{width:100%;height:100%;display:block}
    .nav-logo-text{display:flex;flex-direction:column}
    .nav-logo-text .zh{font-size:.85rem;font-weight:700;color:#fff;letter-spacing:1px;transition:color .4s}
    .nav-logo-text .en{font-size:.6rem;color:#6a8ab5;letter-spacing:3px;text-transform:uppercase}
    .nav-right{display:flex;align-items:center;gap:12px}
    .nav-back{color:#6a8ab5;text-decoration:none;font-size:.82rem;font-weight:500;transition:color .3s;display:flex;align-items:center;gap:6px}
    .nav-back:hover{color:#4a9eff}
    .theme-toggle,.lang-toggle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;border:1px solid rgba(74,158,255,.25);background:rgba(74,158,255,.1);transition:all .3s;color:#4a9eff;flex-shrink:0}
    .theme-toggle:hover,.lang-toggle:hover{background:rgba(74,158,255,.2)}
    .lang-toggle{width:auto;padding:0 12px;border-radius:16px;font-size:.7rem;font-weight:600;letter-spacing:1px}

    /* 页面头部 */
    .page-header{padding:120px 24px 40px;text-align:center;position:relative}
    .page-header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,#4a9eff,transparent)}
    .page-header .tag{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:#4a9eff;font-weight:500;margin-bottom:16px}
    .page-header h1{font-size:clamp(1.8rem,3.6vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:12px;color:#fff;transition:color .4s}
    body.light-theme .page-header h1{color:#1a2a3a}
    .page-header h1 .highlight{color:#4a9eff}
    .page-header .sub{font-size:clamp(.85rem,1vw,.95rem);color:#8a9bb5;max-width:600px;margin:0 auto;transition:color .4s}

    /* ========== 视频网格 ========== */
    .video-grid{max-width:1200px;margin:36px auto 80px;padding:0 24px}
    .grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .video-card{cursor:pointer;border-radius:10px;overflow:hidden;transition:transform .3s,box-shadow .3s;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
    .video-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
    body.light-theme .video-card{background:#fff;border-color:rgba(0,0,0,.06)}
    body.light-theme .video-card:hover{box-shadow:0 12px 40px rgba(0,0,0,.1)}
    .card-cover{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:3rem}
    .card-cover .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
    .video-card:hover .play-overlay{opacity:1}
    .play-overlay .play-circle{width:56px;height:56px;border-radius:50%;background:rgba(74,158,255,.9);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;transition:transform .3s}
    .video-card:hover .play-circle{transform:scale(1.1)}
    .card-duration{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.75);color:#fff;font-size:.72rem;padding:2px 8px;border-radius:4px;font-weight:500}
    .card-body{padding:12px 14px 14px}
    .card-title{font-size:.88rem;font-weight:600;color:#fff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .3s;min-height:2.5em}
    .video-card:hover .card-title{color:#4a9eff}
    .card-meta{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:.74rem;color:#6a8ab5}

    /* ========== 视频详情播放页 ========== */
    .detail-view{display:none;max-width:1000px;margin:0 auto;padding:100px 24px 80px}
    .detail-view.active{display:block;animation:fadeIn .35s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .detail-header .back-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:transparent;color:#8a9bb5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .3s;flex-shrink:0}
    .detail-header .back-btn:hover{color:#4a9eff;border-color:#4a9eff}
    .detail-header .video-title{font-size:1.2rem;font-weight:600;color:#fff;flex:1;min-width:0}
    .detail-header .video-desc{width:100%;font-size:.85rem;color:#6a8ab5;margin-top:-4px;padding-left:56px}
    .player-wrap{width:100%;border-radius:12px;overflow:hidden;background:#000;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .video-js{width:100%;height:0;padding-bottom:56.25%}
    .video-js .vjs-tech{position:absolute;top:0;left:0;width:100%;height:100%}

    /* 网格空状态 */
    .grid-empty{text-align:center;padding:80px 20px;color:#6a8ab5}
    .grid-empty .empty-icon{font-size:4rem;margin-bottom:16px;opacity:.5}
    .grid-empty .empty-text{font-size:.95rem}

    /* 页面加载 */
    .page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#03050a;z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .8s ease}
    .page-loader.hidden{opacity:0;pointer-events:none}
    .loader-icon{width:36px;height:36px;border:2px solid rgba(74,158,255,.15);border-top-color:#4a9eff;border-radius:50%;animation:spin .8s linear infinite}
    .loader-text{font-size:.75rem;color:#4a6a8a;letter-spacing:4px;text-transform:uppercase}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 响应式 */
    @media(max-width:768px){
        .page-header{padding:100px 20px 30px}
        .grid-container{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
        .card-body{padding:10px 12px 12px}
        .card-title{font-size:.82rem;min-height:2.2em}
        .card-meta{font-size:.7rem;gap:8px}
        .detail-view{padding:90px 16px 60px}
        .detail-header .video-desc{padding-left:0}
        .nav-inner{padding:0 16px}
        .nav-right{gap:8px}
    }
    @media(max-width:480px){
        .page-header{padding:90px 16px 24px}
        .page-header h1{font-size:1.5rem}
        .grid-container{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
        .card-cover{font-size:2rem}
        .play-overlay .play-circle{width:44px;height:44px;font-size:1.1rem}
        .nav-logo-text .zh{font-size:.78rem}
        .nav-logo-text .en{font-size:.55rem}
    }
    /* 后台管理面板 */
    .admin-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;animation:fadeIn .25s ease}
    .admin-overlay.show{display:flex}
    .admin-modal{background:#0e121f;border:1px solid rgba(74,158,255,.2);border-radius:16px;padding:32px;max-width:96%;max-height:90vh;overflow-y:auto;width:900px;color:#e0e4ee;position:relative;animation:slideIn .3s ease}
    .admin-modal.small{width:380px}
    @keyframes slideIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    .admin-modal h2{font-size:1.2rem;margin-bottom:20px;color:#4a9eff;font-weight:600}
    .admin-modal input,.admin-modal textarea,.admin-modal select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#e0e4ee;font-size:.85rem;font-family:inherit;margin-bottom:12px;outline:none;transition:border .3s}
    .admin-modal input:focus,.admin-modal textarea:focus{border-color:#4a9eff}
    .admin-modal textarea{min-height:80px;resize:vertical}
    .admin-modal label{display:block;font-size:.78rem;color:#8a9bb5;margin-bottom:4px;font-weight:500}
    .admin-btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:500;transition:all .3s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
    .admin-btn.primary{background:#4a9eff;color:#fff}.admin-btn.primary:hover{background:#3a8aee}
    .admin-btn.danger{background:#e04040;color:#fff}.admin-btn.danger:hover{background:#cc3030}
    .admin-btn.secondary{background:rgba(255,255,255,.08);color:#8a9bb5}.admin-btn.secondary:hover{background:rgba(255,255,255,.12);color:#e0e4ee}
    .admin-btn.small{padding:5px 12px;font-size:.75rem}
    .admin-close{position:absolute;top:16px;right:20px;cursor:pointer;font-size:1.4rem;color:#5a6a7a;transition:color .3s;background:none;border:none;z-index:1}
    .admin-close:hover{color:#e0e4ee}
    .admin-table{width:100%;border-collapse:collapse;margin-bottom:16px}
    .admin-table th,.admin-table td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);font-size:.82rem}
    .admin-table th{color:#4a9eff;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
    .admin-table td{color:#b0c0d0}
    .admin-table tr:hover td{background:rgba(74,158,255,.04)}
    .admin-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .admin-error{color:#e04040;font-size:.8rem;margin-bottom:12px;padding:8px 12px;background:rgba(224,64,64,.1);border-radius:6px;display:none}
    .admin-status{padding:3px 10px;border-radius:4px;font-size:.68rem;font-weight:600}
    .admin-status.loading{background:rgba(74,158,255,.1);color:#4a9eff}
    .progress-bar{width:100%;height:24px;background:rgba(255,255,255,.06);border-radius:12px;overflow:hidden;margin:8px 0;position:relative}
    .progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#4a9eff,#80c8ff);border-radius:12px;transition:width .4s ease}
    .progress-bar .label{position:absolute;top:0;left:0;right:0;height:24px;line-height:24px;text-align:center;font-size:.72rem;color:#fff;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6)}
    .progress-bar .fill.anim{animation:pulse 1.2s ease infinite}
    @keyframes pulse{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}
    body.light-theme .progress-bar{background:rgba(0,0,0,.08)}
    body.light-theme .progress-bar .fill{background:linear-gradient(90deg,#3a8aee,#80c8ff)}
    body.light-theme .progress-bar .label{color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6)}
    </style>
</head>
<body>

<!-- 加载动画 -->
<div class="page-loader" id="pageLoader">
    <div class="loader-icon"></div>
    <div class="loader-text" data-i18n="loader">感知起源 · 加载中</div>
</div>

<!-- 导航栏 -->
<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-icon"><img src="图片/感知起源图标.png" alt="感知起源"></div>
            <div class="nav-logo-text">
                <span class="zh">感知起源</span>
                <span class="en">Sensing Origin</span>
            </div>
        </a>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" title="切换主题">&#x263E;</button>
            <button class="lang-toggle" id="langToggle">EN</button>
            <a href="index.html" class="nav-back" data-i18n="backHome">← 返回首页</a>
        </div>
    </div>
</nav>

<!-- 页面头部 -->
<div class="page-header">
    <div class="tag" data-i18n="techTag">Tech Exchange</div>
    <h1><span data-i18n="techTitle">技术</span> <span class="highlight" data-i18n="techTitleHL">交流</span></h1>
    <p class="sub" data-i18n="techSub">技术视频分享、载荷演示与SAR遥感知识交流平台</p>
</div>

<!-- ===== 视频网格视图 ===== -->
<div class="video-grid" id="gridView">
    <div class="grid-container" id="gridContainer"></div>
</div>

<!-- ===== 视频详情播放视图 ===== -->
<div class="detail-view" id="detailView">
    <div class="detail-header">
        <button class="back-btn" id="detailBack" title="返回列表">&#x2190;</button>
        <div class="video-title" id="detailTitle"></div>
        <div class="video-desc" id="detailDesc"></div>
    </div>
    <div class="player-wrap">
        <video id="myPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js" defer></script>
<script>
(function() {
    // ===== 视频数据 =====
    var SERVER = 'https://video.sensing-origin.cn:8443/vod/';
    var videoData = [];

    // API 配置 — 部署时改成实际服务器地址
    var API_BASE_URL = 'https://video.sensing-origin.cn:8443';

    // 从 API 加载视频数据，失败时保持空数组（显示空状态）
    function loadVideosFromAPI() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_BASE_URL + '/api/tech-videos', true);
        xhr.timeout = 8000;
        xhr.onload = function() {
            if (xhr.status === 200) {
                try {
                    var list = JSON.parse(xhr.responseText);
                    if (list && list.length > 0) {
                        videoData = list.map(function(item, idx) {
                            return {
                                id: 'v' + (idx + 1),
                                title: {zh: item.title_zh||'', en: item.title_en||''},
                                desc: {zh: item.desc_zh||'', en: item.desc_en||''},
                                filename: item.filename||'',
                                duration: item.duration||'',
                                coverGradient: item.cover_gradient||'linear-gradient(135deg,#0a1628,#1a3a5a,#0d2840)',
                                coverIcon: item.cover_icon||'🛰️'
                            };
                        });
                        renderGrid();
                    }
                } catch(e) { console.warn('API 数据解析失败', e); }
            }
        };
        xhr.send();
    }


    // ===== 状态 =====
    var currentLang = 'zh';
    var currentTheme = 'dark';
    var loader = document.getElementById('pageLoader');
    var themeBtn = document.getElementById('themeToggle');
    var langBtn = document.getElementById('langToggle');
    var gridView = document.getElementById('gridView');
    var detailView = document.getElementById('detailView');
    var gridContainer = document.getElementById('gridContainer');
    var detailBack = document.getElementById('detailBack');
    var detailTitle = document.getElementById('detailTitle');
    var detailDesc = document.getElementById('detailDesc');
    var player = null;

    // ===== 安全 localStorage（兼容 file:// 协议） =====
    function safeGet(key, def) {
        try { var v = localStorage.getItem(key); return v !== null ? v : def; }
        catch(e) { return def; }
    }
    function safeSet(key, val) {
        try { localStorage.setItem(key, val); }
        catch(e) {}
    }

    // ===== 国际化 =====
    var i18nData = {
        zh: {
            techTag: 'Tech Exchange',
            techTitle: '技术',
            techTitleHL: '交流',
            techSub: '技术视频分享、载荷演示与SAR遥感知识交流平台',
            backHome: '← 返回首页',
            loader: '感知起源 · 加载中',
            backList: '返回列表',
            emptyTitle: '暂无视频',
            emptySub: '精彩内容即将上线，敬请期待',
            views: '次播放'
        },
        en: {
            techTag: 'Tech Exchange',
            techTitle: 'Tech',
            techTitleHL: 'Exchange',
            techSub: 'Technical video sharing, payload demos & SAR remote sensing knowledge exchange',
            backHome: '← Home',
            loader: 'Sensing Origin · Loading',
            backList: 'Back',
            emptyTitle: 'No Videos Yet',
            emptySub: 'Amazing content coming soon, stay tuned',
            views: 'views'
        }
    };

    // ===== 渲染网格 =====
    function renderGrid() {
        if (!videoData || !videoData.length) {
            gridContainer.innerHTML =
                '<div class="grid-empty">' +
                '<div class="empty-icon">🎬</div>' +
                '<div class="empty-text" data-i18n="emptyTitle">' + i18nData[currentLang].emptyTitle + '</div>' +
                '<div class="empty-text" style="font-size:.78rem;margin-top:8px;color:#5a7a9a" data-i18n="emptySub">' + i18nData[currentLang].emptySub + '</div>' +
                '</div>';
            return;
        }
        var t = i18nData[currentLang];
        var html = '';
        for (var i = 0; i < videoData.length; i++) {
            var v = videoData[i];
            var title = v.title[currentLang] || v.title.zh;
            html +=
                '<div class="video-card" data-id="' + v.id + '" onclick="window.openVideo(\'' + v.id + '\')">' +
                    '<div class="card-cover" style="background:' + v.coverGradient + '">' +
                        '<span style="opacity:.85">' + v.coverIcon + '</span>' +
                        '<div class="play-overlay"><div class="play-circle">&#x25B6;</div></div>' +
                        '<span class="card-duration">' + v.duration + '</span>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<div class="card-title">' + escapeHtml(title) + '</div>' +
                        '<div class="card-meta">' +
                            '<span>' + v.duration + '</span>' +
                            '<span>&middot;</span>' +
                            '<span>' + (Math.floor(Math.random() * 800) + 200) + ' ' + t.views + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        }
        gridContainer.innerHTML = html;
    }

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    // ===== 打开视频详情 =====
    window.openVideo = function(id) {
        var v = null;
        for (var i = 0; i < videoData.length; i++) {
            if (videoData[i].id === id) { v = videoData[i]; break; }
        }
        if (!v) return;

        gridView.style.display = 'none';
        detailView.style.display = '';          // 清除 backToGrid 可能设置的 display:none
        detailView.classList.add('active');

        var title = v.title[currentLang] || v.title.zh;
        var desc = v.desc[currentLang] || v.desc.zh;
        detailTitle.textContent = title;
        detailDesc.textContent = desc;

        // 播放视频
        if (!player) {
            player = videojs('myPlayer');
        }
        var url = SERVER + v.filename;
        player.src({ src: url, type: 'video/mp4' });
        player.play();

        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ===== 返回列表 =====
    function backToGrid() {
        if (player) {
            player.pause();
            player.reset();                     // 清除播放器状态，避免下次播放异常
        }
        detailView.classList.remove('active');
        detailView.style.display = 'none';
        gridView.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    detailBack.addEventListener('click', backToGrid);

    // ===== 主题切换 =====
    function applyTheme(theme) {
        currentTheme = theme;
        document.body.classList.toggle('light-theme', theme === 'light');
        themeBtn.innerHTML = theme === 'light' ? '&#x2600;' : '&#x263E;';
        safeSet('so-tech-theme', theme);
    }

    // ===== 语言切换 =====
    function applyLang(lang) {
        currentLang = lang;
        document.body.setAttribute('data-lang', lang);
        langBtn.textContent = lang === 'zh' ? 'EN' : '中';
        var t = i18nData[lang];
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            if (t[key] !== undefined) el.innerHTML = t[key];
        });
        safeSet('so-tech-lang', lang);
        renderGrid();
    }

    // ===== 事件绑定 =====
    themeBtn.addEventListener('click', function() {
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });
    langBtn.addEventListener('click', function() {
        applyLang(currentLang === 'zh' ? 'en' : 'zh');
    });

    // ===== 初始化 =====
    applyTheme(localStorage.getItem('so-tech-theme') || 'dark');
    applyLang(localStorage.getItem('so-tech-lang') || 'zh');
    renderGrid();

    setTimeout(function() {
        if (loader) {
            loader.classList.add('hidden');
            setTimeout(function() { loader.style.display = 'none'; }, 800);
        }
    }, 200);

    // 从 API 加载视频（异步）
    loadVideosFromAPI();

    // ========== 后台管理面板 ==========
    var adminToken = (function(){try{return localStorage.getItem('so-admin-token')||''}catch(e){return ''}})();
    var adminUser = (function(){try{return localStorage.getItem('so-admin-user')||''}catch(e){return ''}})();
    var adminKeySeq = [];

    function safeGet(k,d){try{var v=localStorage.getItem(k);return v!==null?v:d}catch(e){return d}}
    function safeSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === '`') { e.preventDefault(); showAdminLogin(); }
    });

    function showAdminLogin() {
        var overlay = document.getElementById('adminOverlay');
        if (!overlay) return;
        overlay.innerHTML = '<div class="admin-modal small" id="adminLoginModal">' +
            '<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">&times;</button>' +
            '<h2>管理员登录</h2>' +
            '<div class="admin-error" id="adminLoginError" style="display:none"></div>' +
            '<label>用户名</label><input type="text" id="adminUserInput" value="liyuchen" />' +
            '<label>密码</label><input type="password" id="adminPassInput" value="" />' +
            '<button class="admin-btn primary" style="width:100%;justify-content:center;margin-top:8px" onclick="doAdminLogin()">登录</button></div>';
        overlay.classList.add('show');
        setTimeout(function(){var p=document.getElementById('adminPassInput');if(p)p.focus()},300);
    }

    window.doAdminLogin = function() {
        var u = document.getElementById('adminUserInput').value;
        var p = document.getElementById('adminPassInput').value;
        var errEl = document.getElementById('adminLoginError');
        var xhr = new XMLHttpRequest();
        xhr.open('POST', API_BASE_URL + '/api/auth', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onload = function() {
            if (xhr.status === 200) {
                var r = JSON.parse(xhr.responseText);
                adminToken = r.token; adminUser = r.username;
                safeSet('so-admin-token', adminToken); safeSet('so-admin-user', adminUser);
                showAdminPanel();
            } else {
                if(errEl){errEl.textContent='用户名或密码错误';errEl.style.display='block';}
            }
        };
        xhr.onerror = function(){if(errEl){errEl.textContent='无法连接服务器';errEl.style.display='block'}};
        xhr.send(JSON.stringify({username:u,password:p}));
    };

    window.adminLogout = function() {
        adminToken = ''; adminUser = '';
        safeSet('so-admin-token',''); safeSet('so-admin-user','');
        document.getElementById('adminOverlay').classList.remove('show');
    };

    window.showAdminPanel = function() {
        if (!adminToken) { showAdminLogin(); return; }
        var overlay = document.getElementById('adminOverlay');
        overlay.innerHTML = '<div class="admin-modal" style="width:960px">' +
            '<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">&times;</button>' +
            '<div class="admin-toolbar"><h2>视频管理</h2>' +
            '<div style="display:flex;gap:8px;align-items:center">' +
            '<button class="admin-btn primary small" onclick="adminAddVideo()">+ 新增视频</button>' +
            '<button class="admin-btn primary small" onclick="adminUploadVideo()">↑ 上传视频</button>' +
            '<button class="admin-btn secondary small" onclick="adminLogout()">退出</button></div></div>' +
            '<div id="adminVideoList"><div class="admin-status loading">加载中...</div></div></div>';
        overlay.classList.add('show');
        adminRefreshVideoList();
    };

    window.adminRefreshVideoList = function() {
        var el = document.getElementById('adminVideoList');
        if (!el) return;
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_BASE_URL + '/api/tech-videos', true);
        xhr.onload = function() {
            if (xhr.status !== 200) { el.innerHTML = '<div class="admin-error" style="display:block">加载失败</div>'; return; }
            var list = JSON.parse(xhr.responseText);
            if (!list || list.length === 0) {
                el.innerHTML = '<p style="color:#5a7a9a;text-align:center;padding:20px">暂无视频</p>'; return;
            }
            var html = '<table class="admin-table"><tr><th>ID</th><th>标题</th><th>文件名</th><th>时长</th><th>排序</th><th style="width:120px">操作</th></tr>';
            list.forEach(function(item) {
                html += '<tr><td>' + item.id + '</td><td>' + escHtml(item.title_zh||'') + '</td><td>' + escHtml(item.filename||'') + '</td><td>' + (item.duration||'') + '</td><td>' + (item.sort||0) + '</td>' +
                    '<td><button class="admin-btn secondary small" onclick="adminEditVideo(' + item.id + ')">编辑</button> ' +
                    '<button class="admin-btn danger small" onclick="adminDeleteVideo(' + item.id + ')">删除</button></td></tr>';
            });
            html += '</table>';
            el.innerHTML = html;
        };
        xhr.send();
    };

    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function adminApi(method, path, body, cb) {
        var xhr = new XMLHttpRequest();
        xhr.open(method, API_BASE_URL + path, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('Authorization', 'Bearer ' + adminToken);
        xhr.onload = function(){var r={};try{r=JSON.parse(xhr.responseText)}catch(e){}if(cb)cb(xhr.status,r)};
        xhr.onerror = function(){if(cb)cb(0,{error:'网络错误'})};
        xhr.send(body?JSON.stringify(body):null);
    }

    window.adminAddVideo = function() {
        document.getElementById('adminOverlay').innerHTML =
            '<div class="admin-modal" style="width:600px">' +
            '<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">&times;</button>' +
            '<h2>新增视频条目</h2>' +
            '<div class="admin-error" id="adminFormError" style="display:none"></div>' +
            '<label>标题（中文）</label><input id="f_title_zh" />' +
            '<label>标题（英文）</label><input id="f_title_en" />' +
            '<label>描述（中文）</label><textarea id="f_desc_zh"></textarea>' +
            '<label>描述（英文）</label><textarea id="f_desc_en"></textarea>' +
            '<label>文件名</label><input id="f_filename" placeholder="xxx.mp4" />' +
            '<label>时长</label><input id="f_duration" placeholder="03:45" />' +
            '<label>排序</label><input id="f_sort" type="number" />' +
            '<label>封面渐变（CSS）</label><input id="f_cover_gradient" value="linear-gradient(135deg,#0a1628,#1a3a5a,#0d2840)" />' +
            '<label>封面图标（emoji）</label><input id="f_cover_icon" value="🛰️" />' +
            '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">' +
            '<button class="admin-btn secondary" onclick="window.showAdminPanel()">取消</button>' +
            '<button class="admin-btn primary" onclick="adminSaveVideo()">保存</button></div></div>';
    };

    window.adminSaveVideo = function() {
        var data = {
            sort: parseInt(document.getElementById('f_sort').value) || 0,
            title_zh: document.getElementById('f_title_zh').value,
            title_en: document.getElementById('f_title_en').value,
            desc_zh: document.getElementById('f_desc_zh').value,
            desc_en: document.getElementById('f_desc_en').value,
            filename: document.getElementById('f_filename').value,
            duration: document.getElementById('f_duration').value,
            cover_gradient: document.getElementById('f_cover_gradient').value,
            cover_icon: document.getElementById('f_cover_icon').value
        };
        adminApi('POST', '/api/tech-videos', data, function(status, r) {
            if (status === 201 || status === 200) { window.showAdminPanel(); loadVideosFromAPI(); }
            else { var e=document.getElementById('adminFormError'); if(e){e.textContent=r.error||'保存失败';e.style.display='block';} }
        });
    };

    window.adminEditVideo = function(id) {
        var overlay = document.getElementById('adminOverlay');
        overlay.innerHTML = '<div class="admin-modal" style="width:600px"><div class="admin-status loading">加载中...</div></div>';
        overlay.classList.add('show');
        adminApi('GET', '/api/tech-videos/' + id, null, function(status, item) {
            if (status !== 200) { overlay.innerHTML='<div class="admin-modal" style="width:600px"><div class="admin-error" style="display:block">加载失败</div></div>'; return; }
            overlay.innerHTML =
                '<div class="admin-modal" style="width:600px">' +
                '<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">&times;</button>' +
                '<h2>编辑视频 #' + id + '</h2>' +
                '<div class="admin-error" id="adminFormError" style="display:none"></div>' +
                '<label>标题（中文）</label><input id="f_title_zh" value="' + escHtml(item.title_zh||'') + '" />' +
                '<label>标题（英文）</label><input id="f_title_en" value="' + escHtml(item.title_en||'') + '" />' +
                '<label>描述（中文）</label><textarea id="f_desc_zh">' + escHtml(item.desc_zh||'') + '</textarea>' +
                '<label>描述（英文）</label><textarea id="f_desc_en">' + escHtml(item.desc_en||'') + '</textarea>' +
                '<label>文件名</label><input id="f_filename" value="' + escHtml(item.filename||'') + '" />' +
                '<label>时长</label><input id="f_duration" value="' + escHtml(item.duration||'') + '" />' +
                '<label>排序</label><input id="f_sort" type="number" value="' + (item.sort||0) + '" />' +
                '<label>封面渐变</label><input id="f_cover_gradient" value="' + escHtml(item.cover_gradient||'') + '" />' +
                '<label>封面图标</label><input id="f_cover_icon" value="' + escHtml(item.cover_icon||'') + '" />' +
                '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">' +
                '<button class="admin-btn secondary" onclick="window.showAdminPanel()">取消</button>' +
                '<button class="admin-btn primary" onclick="adminUpdateVideo(' + id + ')">保存</button></div></div>';
        });
    };

    window.adminUpdateVideo = function(id) {
        var data = {
            sort: parseInt(document.getElementById('f_sort').value) || 0,
            title_zh: document.getElementById('f_title_zh').value,
            title_en: document.getElementById('f_title_en').value,
            desc_zh: document.getElementById('f_desc_zh').value,
            desc_en: document.getElementById('f_desc_en').value,
            filename: document.getElementById('f_filename').value,
            duration: document.getElementById('f_duration').value,
            cover_gradient: document.getElementById('f_cover_gradient').value,
            cover_icon: document.getElementById('f_cover_icon').value
        };
        adminApi('PUT', '/api/tech-videos/' + id, data, function(status, r) {
            if (status === 200) { window.showAdminPanel(); loadVideosFromAPI(); }
            else { var e=document.getElementById('adminFormError'); if(e){e.textContent=r.error||'保存失败';e.style.display='block';} }
        });
    };

    window.adminDeleteVideo = function(id) {
        if (!confirm('确认删除？')) return;
        adminApi('DELETE', '/api/tech-videos/' + id, null, function(status) {
            if (status === 200) { adminRefreshVideoList(); loadVideosFromAPI(); }
        });
    };

    window.adminUploadVideo = function() {
        var overlay = document.getElementById('adminOverlay');
        overlay.innerHTML = '<div class="admin-modal" style="width:500px">' +
            '<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">&times;</button>' +
            '<h2>上传视频</h2>' +
            '<div class="admin-error" id="adminUploadError" style="display:none"></div>' +
            '<div class="admin-success" id="adminUploadSuccess" style="display:none"></div>' +
            '<label>选择视频文件（mp4/flv/avi/mov/mkv）</label>' +
            '<input type="file" id="adminUploadFile" accept=".mp4,.flv,.avi,.mov,.mkv" />' +
            '<div class="progress-bar" id="adminUploadProgress"><div class="fill" id="adminUploadFill"></div><div class="label" id="adminUploadLabel">等待上传</div></div>' +
            '<button class="admin-btn primary" style="width:100%;justify-content:center" onclick="adminDoUpload()">开始上传</button></div>';
        overlay.classList.add('show');
    };

    window.adminDoUpload = function() {
        var fileInput = document.getElementById('adminUploadFile');
        if (!fileInput || !fileInput.files || !fileInput.files[0]) {
            var e=document.getElementById('adminUploadError'); if(e){e.textContent='请选择文件';e.style.display='block';} return;
        }
        var file = fileInput.files[0];
        var CHUNK_SIZE = 1024 * 1024; // 1MB 一个分片
        var totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        var sizeMB = (file.size/1024/1024).toFixed(1);
        var fill = document.getElementById('adminUploadFill');
        var label = document.getElementById('adminUploadLabel');
        var errorEl = document.getElementById('adminUploadError');
        var successEl = document.getElementById('adminUploadSuccess');
        if (errorEl) errorEl.style.display = 'none';
        if (successEl) successEl.style.display = 'none';
        if (label) label.textContent = '上传中 0% (0/' + sizeMB + ' MB)';
        if (fill) { fill.style.width = '0%'; fill.classList.add('anim'); }

        var currentChunk = 0;

        function uploadNextChunk() {
            var start = currentChunk * CHUNK_SIZE;
            var end = Math.min(start + CHUNK_SIZE, file.size);
            var chunkBlob = file.slice(start, end);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_BASE_URL + '/api/upload/video?chunk=' + currentChunk + '&total=' + totalChunks, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + adminToken);
            xhr.setRequestHeader('X-Filename', file.name);
            xhr.setRequestHeader('Content-Type', 'application/octet-stream');

            xhr.onload = function() {
                if (xhr.status === 201) {
                    currentChunk++;
                    var pct = Math.round(currentChunk / totalChunks * 100);
                    if (fill) { fill.style.width = pct + '%'; fill.classList.remove('anim'); }
                    if (label) label.textContent = '上传中 ' + pct + '% (' + currentChunk + '/' + totalChunks + ' 块)';

                    if (currentChunk < totalChunks) {
                        uploadNextChunk();
                    } else {
                        // 所有分片上传完成，处理最后一个响应
                        try {
                            var r = JSON.parse(xhr.responseText);
                            if (successEl) { successEl.textContent = '上传成功！文件：'+r.filename+'，封面：'+(r.cover||'无'); successEl.style.display='block'; }
                            if (fill) { fill.style.width = '100%'; fill.classList.remove('anim'); }
                            if (label) label.textContent = '上传完成 ✅';
                        } catch(ex) {
                            if (errorEl) { errorEl.textContent = '解析响应失败'; errorEl.style.display='block'; }
                        }
                    }
                } else {
                    if (errorEl) {
                        try { var r = JSON.parse(xhr.responseText); errorEl.textContent = r.error || '上传失败'; }
                        catch(ex) { errorEl.textContent = '上传失败'; }
                        errorEl.style.display = 'block';
                    }
                    if (fill) { fill.style.width = '0%'; fill.classList.remove('anim'); }
                    if (label) label.textContent = '上传失败 ❌ (' + xhr.status + ')';
                }
            };
            xhr.onerror = function(){
                if (errorEl) { errorEl.textContent = '网络错误'; errorEl.style.display='block'; }
                if (fill) { fill.style.width = '0%'; fill.classList.remove('anim'); }
                if (label) label.textContent = '网络错误 ❌';
            };
            xhr.send(chunkBlob);
        }

        uploadNextChunk();
    };
    window.showAdminLogin = showAdminLogin;
})();
</script>
<div class="admin-overlay" id="adminOverlay"></div>
</body>
