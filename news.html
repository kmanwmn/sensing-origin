<script>
(function() {
    var newsData = [{id:'news-14',sort:20251228,date:{zh:'2025年12月28日',en:'Dec 28, 2025'},badge:{zh:'产品进展',en:'Progress'},title:{zh:'感知起源SO01项目天线系统鉴定试验验证成功',en:'SO01 Antenna System Qualification Test Successful'},summary:{zh:'感知起源SO01项目天线系统顺利完成高温鉴定试验，电子单元在70度高温真空环境下成功开机工作，验证了系统在极端环境下的可靠性与稳定性。',en:'SO01 antenna system completed high-temperature qualification testing, verifying system reliability under extreme conditions.'},imgGradient:'linear-gradient(135deg,#0a1628,#1a2a4a,#0d1e38)',imgIcon:'🔬',images:[{src:'图片/感知起源SO01项目天线系统鉴定试验验证-1.jpg',caption:'SO01天线系统鉴定试验-电子单元测试'},{src:'图片/感知起源SO01项目天线系统鉴定试验验证-2.jpg',caption:'SO01天线系统鉴定试验-测试数据'},{src:'图片/感知起源SO01项目天线系统鉴定试验验证-3.jpg',caption:'SO01天线系统鉴定试验-高温环境验证'}],source:{zh:'感知起源',en:'Sensing Origin'},sourceUrl:'#',content:{zh:[{type:'p',text:'感知起源SO01项目天线系统顺利完成电子单元高温鉴定试验。在70度高温真空环境下，电子单元严格按照试验方法完成标准测试后，又进行了两次开机极限测试，全面验证了系统在极端工况下的可靠性与稳定性。'},{type:'h2',text:'试验方案'},{type:'p',text:'本次鉴定试验旨在验证电子单元在高温极限环境下的工作能力。试验在70度高温真空环境中进行，电磁波暗室为测试提供了理想的电磁屏蔽环境。测试分为标准测试和极限测试两个阶段，重点考察了RFSoC（射频系统级芯片）在高温条件下的温升特性、系统运行稳定性及数据采集可靠性。'},{type:'h2',text:'第一次开机测试'},{type:'p',text:'首次开机时，RFSoC温度约为73度，累计加电323秒。测试中对通道一进行连续参考定标30M带宽测试，累计工作2分钟后正常关机。系统运行稳定，遥测数据正常，各项指标达到预期。'},{type:'h2',text:'第二次开机极限测试'},{type:'p',text:'第二次开机为极限工况测试，累计加电492秒。RFSoC温度采集显示最高达到89.2度，在接近90度的高温极限下，系统依然保持稳定运行。测试中对通道二进行连续参考定标200M带宽测试（带宽较第一次测试提升近7倍），工作两分钟后未进行下电操作，持续监控系统运行状态直至490秒。'},{type:'p',text:'试验过程中发现：第二次加电的遥测数据在350秒处出现一帧异常，349秒时RFSoC温度为86度。此时电子单元已进入待机状态，但软件并未出现跑飞或死机，后续加电时间从351秒起连续正常上升。技术团队初步判定为遥测数据传输过程中的偶发异常帧，不影响系统核心功能。后续测试将在高温情况下着重关注此现象，持续优化数据采集链路的抗干扰能力。'},{type:'h2',text:'试验结论'},{type:'p',text:'本次鉴定试验得出关键结论：电子单元在70度高温真空环境下开机工作10至15分钟是可行的。RFSoC在最高89.2度的极限温度下仍能保持正常工作，系统软件在高温待机状态下未发生跑飞或死机，充分证明了感知起源SAR载荷核心硬件在极端温度条件下的工程可靠性与环境适应能力。'},{type:'p',text:'SO01项目作为感知起源首套商业SAR载荷的研制项目，其天线系统鉴定试验的成功，标志着公司在星载SAR载荷核心硬件研制方面取得了关键突破。这一里程碑为后续整机集成、环境试验以及最终的入轨验证奠定了坚实的工程基础，向着首套全自研商业MIMOSAR载荷在轨验证的目标迈出了坚实一步。'},{type:'highlight',text:'电子单元在70度高温真空环境下稳定工作10至15分钟，RFSoC最高耐受温度达89.2度，系统软件在极限工况下保持稳定——SO01天线系统鉴定试验圆满成功，为感知起源首套SAR载荷在轨验证奠定关键基础。'}]}},{id:'news-13',sort:20251031,date:{zh:'2025年10月31日',en:'Oct 31, 2025'},badge:{zh:'融资动态',en:'Finance'},title:{zh:'感知起源完成年内第三笔融资 单笔近两千万',en:'Sensing Origin Completes 3rd Funding Round of 2025'},summary:{zh:'感知起源2025年第三笔融资近两千万开始到账，年内累计融资持续推进，为公司研发与运营提供充足资金保障。',en:'Sensing Origin\'s 3rd funding round of nearly ¥20M begins to arrive, ensuring sufficient capital for R&D and operations.'},imgGradient:'linear-gradient(135deg,#0a1a2e,#1a3a5a,#0e2a40)',imgIcon:'💪',images:[],source:{zh:'感知起源',en:'Sensing Origin'},sourceUrl:'#',content:{zh:[{type:'p',text:'2025年10月31日，感知起源2025年第三笔融资近两千万开始到账。公司年内规划四笔融资，每笔均超千万，以确保公司运行的绝对安全、为团队提供稳定的工作环境，同时为研发团队提供充足的研发资金。'},{type:'h2',text:'融资进展'},{type:'p',text:'2025年初，公司提出了明确的年度融资目标：完成四笔融资，每笔过千万。继前两笔融资顺利完成后，第三笔近两千万元资金于10月31日开始到账，标志着公司融资计划稳步推进。'},{type:'p',text:'创始人鞠在强博士表示，融资工作的持续推进将帮助公司进一步扩大优势，支持首套商业MIMOSAR载荷的研发与验证工作，为打造一流设备、成为行业明星提供坚实的资金保障。'},{type:'h2',text:'全年展望'},{type:'p',text:'第四笔融资正在积极接洽中，年底前还将有资金进账。待全年融资工作全部结束后，公司将通过官方公众号正式对外发布完整融资信息，宣告感知起源的全面崛起。'},{type:'highlight',text:'志合者，不以山海为远。感知起源团队虽聚少离多，但始终为同一目标共同努力——打造自主可控的商业SAR载荷，成为行业标杆。'}]}},{id:'news-12',sort:20241130,date:{zh:'2024年11月30日',en:'Nov 30, 2024'},badge:{zh:'企业荣誉',en:'Award'},title:{zh:'感知起源荣获厦门大学火炬创业成长营"最具成长潜力项目奖"',en:'Sensing Origin Wins "Most Growth Potential" Award at XMU Torch Entrepreneurship Camp'},summary:{zh:'感知起源在2024厦门大学火炬创业成长营暨南强创业营创新大会上荣获"最具成长潜力项目奖"，成为获此殊荣的三家企业之一。',en:'Sensing Origin awarded "Most Growth Potential Project" at Xiamen University Torch Entrepreneurship Camp.'},imgGradient:'linear-gradient(135deg,#0a162a,#1a2a4a,#0e1a32)',imgIcon:'🏆',images:[{src:'图片/创融汇投资嘉年华.jpg',caption:'感知起源荣获最具成长潜力项目奖'}],source:{zh:'活动现场',en:'Event'},sourceUrl:'#',content:{zh:[{type:'p',text:'2024年11月30日，"2024厦门创融汇投资嘉年华 & 厦门大学火炬创业成长营暨南强创业营创新大会"在厦门人艺剧场隆重举行。活动汇聚了众多知名投资机构与优秀创业项目，感知起源在本次大会上荣获"最具成长潜力项目奖"，同批获奖企业还包括华瓷聚力（厦门）新材料有限公司、福建纯铭新材料科技有限公司。'},{type:'h2',text:'关于创业成长营'},{type:'p',text:'厦门大学火炬创业成长营暨南强创业营由厦门大学校友总会与厦门火炬高新区联合主办，面向全国选拔优秀中小科技型创业公司进行公益创业辅导和培训。本届成长营吸引了全国43个城市的242个硬科技项目报名，覆盖航空航天、半导体智能传感、高端制造、新材料等前沿领域。经过多轮严格筛选，最终仅30个优秀项目入营。'},{type:'p',text:'感知起源凭借在商业SAR载荷领域的技术壁垒、来自中科院空天院的顶尖团队以及广阔的市场前景，在众多入营项目中脱颖而出，荣获"最具成长潜力项目奖"。颁奖嘉宾为厦门火炬高技术产业开发区管理委员会总工程师吴志伟与厦门大学校友总会副秘书长郑辉。'},{type:'h2',text:'获奖后持续发展'},{type:'p',text:'获奖后，感知起源获得了主办方旗下创投机构厦门高新投的直接股权投资，进一步加速了公司的发展步伐。2025年至2026年间，公司完成天使轮及天使+轮融资，累计融资额近亿元，并成功将国际业务总部落户厦门集美区。首套商业MIMOSAR载荷已进入正样阶段，计划于2026年内完成入轨验证并启动批量生产。'},{type:'highlight',text:'从创业营"最具成长潜力项目"到完成近亿元融资、载荷即将入轨验证，感知起源的快速成长充分印证了其作为商业航天领域最具成长潜力项目的实力与前景。'}]}},{id:'news-11',sort:20260119,date:{zh:'2026年1月19日',en:'Jan 19, 2026'},badge:{zh:'签约合作',en:'Partnership'},title:{zh:'"海丝五号"卫星合作签约仪式 感知起源达成三方合作',en:'Sensing Origin Signs "Haishi-5" Satellite Cooperation Agreement'},summary:{zh:'感知起源与鹭江创新实验室、椭圆时空就"海丝五号"卫星项目正式达成三方合作，为卫星提供自研SAR载荷，厦门大学校长及省市多部门领导出席签约仪式。',en:'Sensing Origin partners with Lujiang Innovation Lab and Ellipse Space on the Haishi-5 satellite project, providing SAR payload.'},imgGradient:'linear-gradient(135deg,#0a1628,#0d2a4a,#0a1a3e)',imgIcon:'🤝',images:[{src:'图片/“海丝五号”卫星合作签约仪式.jpg',caption:'"海丝五号"卫星合作签约仪式现场'}],source:{zh:'中国航天报、泰伯网',en:'China Aerospace News, TaiBo'},sourceUrl:'https://www.taibo.cn/test/newsflashes-view/31157603',content:{zh:[{type:'p',text:'2026年1月19日，福建省海洋科学与技术创新实验室（鹭江创新实验室）、椭圆时空与感知起源三方正式签署"海丝五号"卫星项目合作协议。签约仪式恰逢鹭江创新实验室成立一周年，厦门大学校长及福建省科技厅、发改委、海洋与渔业局、厦门市科技局等多部门领导出席并见证签约。'},{type:'h2',text:'感知起源首发SAR正式命名"海丝五号"'},{type:'p',text:'感知起源总经理鞠在强博士在签约仪式上表示："咱们今年的首发SAR有名字了——海丝五号，即海上丝绸之路卫星五号。"他回顾道，2020年他签署了中国第一颗商业SAR卫星"海丝一号"的协议，拉开了中国商业SAR方向的大幕；今天，他又完成了感知起源首发SAR的合作签约，这同时也是中国首颗商业MIMOSAR卫星的合作签约。'},{type:'p',text:'鞠在强博士表示，感知起源的工作站在历史的前沿，正在推进着领域的发展。从"海丝一号"到"海丝五号"，从中国首颗商业SAR卫星到首颗商业MIMOSAR卫星，这一跨越见证了中国商业航天SAR领域的蓬勃发展。'},{type:'h2',text:'三方合作 "星—空—地—海"一体化'},{type:'p',text:'此次三方合作将推动"星—空—地—海"一体化技术的落地应用。"海丝"系列卫星主要面向海洋近岸及内陆水体，为海洋经济、海洋监测、灾害应急响应等领域提供核心数据支撑，服务于海洋强国建设。'},{type:'p',text:'椭圆时空正全力推进太空具身智能服务体系建设，打造由百余颗智能卫星组成的共建共享型星座，实现"空天信息综合感知—在轨智能分析识别—天地协同精准交互"的全链路能力。'},{type:'h2',text:'感知起源——中国首颗商业MIMOSAR卫星'},{type:'p',text:'感知起源作为国内首家商业星载SAR载荷制造商，将为"海丝五号"卫星提供自主研发的商业MIMOSAR载荷产品。MIMOSAR是感知起源的核心专利技术，通过多通道合成孔径与数字波束形成技术，可突破传统SAR高分辨率与大幅宽的制约，成像效率较传统SAR提升5-10倍。'},{type:'p',text:'感知起源的SAR载荷具备全天时、全天候对地观测能力，在海洋监视、海岸带监测、海上目标识别等领域具有独特的技术优势，将为"海丝五号"的海洋监测任务提供核心硬件支撑。此次合作是公司SAR载荷产品在海洋应用领域的重要突破，也是继厦门国际业务总部落地后，公司在福建省的又一次深度布局。'},{type:'highlight',text:'从2020年"海丝一号"拉开中国商业SAR大幕，到2026年"海丝五号"承载中国首颗商业MIMOSAR卫星使命，感知起源正站在历史前沿，推进着领域的发展。'}]}},{id:'news-10',sort:20260507,date:{zh:'2026年5月7日',en:'May 7, 2026'},badge:{zh:'媒体报道',en:'Media'},title:{zh:'福建日报：耐心资本布局硬科技 感知起源获股权投资',en:'Fujian Daily: Patient Capital Invests in Sensing Origin'},summary:{zh:'福建日报报道厦门市、区两级引导基金布局硬科技赛道，感知起源作为典型案例获耐心资本持续支持。总经理鞠在强表示厦门资本最可贵的是在企业最需要的时候果断出手、持续陪伴。',en:'Fujian Daily reports on Xiamen\'s patient capital investing in hard-tech, featuring Sensing Origin as a key example.'},imgGradient:'linear-gradient(135deg,#0a1e2e,#1a3a4a,#0d2a3a)',imgIcon:'📰',images:[{src:'图片/news10-cover.jpg',caption:'福建日报报道截图'}],source:{zh:'福建日报·东南网',en:'Fujian Daily'},sourceUrl:'https://share.fjdaily.com/displayTemplate/news/newsDetail/532548.html?isDigital=true&isShare=true&linkV=1778116721000',content:{zh:[{type:'p',text:'2026年5月7日，福建日报报业集团旗下东南网发表题为《厦门：耐心资本布局硬科技长期赛道》的深度报道，关注厦门市、区两级引导基金以"耐心资本"理念布局硬科技赛道的实践，感知起源作为典型案例被重点报道。报道指出，商业航天是典型的"高投入、长周期、慢回报"赛道，需要资本的长期陪伴与持续赋能。'},{type:'p',text:'感知起源作为商业星载SAR载荷领域的先行者，获得了厦门高新投、集美产业促进基金等本土机构的持续投资，充分体现了"投早、投小、投长期、投硬科技"的耐心资本理念。厦门市、区两级引导基金通过构建覆盖种子期、初创期、成长期的多元化基金体系，为硬科技企业提供了全生命周期的资本支持。'},{type:'h2',text:'鞠在强总经理谈厦门资本'},{type:'p',text:'感知起源总经理鞠在强在报道中表示："厦门资本最可贵的不是资金规模，而是在企业最需要的时候果断出手、持续陪伴。"他介绍，从初次接触到国际业务总部落地，集美区仅用了5个月时间就高效完成了全部对接和落地工作，展现了厦门市在产业招商和企业服务方面的高效执行力。'},{type:'p',text:'鞠在强进一步指出，感知起源选择将国际业务总部落地厦门，看中的不仅是资本的支持，更是厦门作为"海上丝绸之路"核心区的独特区位优势，以及厦门在空天信息产业方面的前瞻布局和产业生态。'},{type:'h2',text:'报道背景'},{type:'p',text:'该报道由福建日报报业集团资深记者林泽贵采写，刊发于东南网及福建日报新媒体平台。文章还报道了厦门市在人工智能、生物医药等其他硬科技领域的投资案例，展现厦门作为科技创新高地的产业生态。报道称，厦门市通过"政府引导+市场运作"的方式，引导社会资本投向早期硬科技企业，有效缓解了科技创新企业融资难、融资贵的问题。'},{type:'highlight',text:'耐心资本"投早、投小、投长期、投硬科技"的理念，与感知起源这类商业航天企业的成长规律高度契合，为硬科技企业的发展提供了可复制的资本赋能样本。'}]}},{id:'news-9',sort:20260601,date:{zh:'2026年6月1日',en:'Jun 1, 2026'},badge:{zh:'公司动态',en:'Event'},title:{zh:'正样产品展示任务圆满收官 全员聚力攻坚首战大捷',en:'Qualification Product Display Mission Successfully Concluded'},summary:{zh:'正样产品展示任务圆满收官，全员聚力攻坚、首战大捷，各项筹备悉数落地，整装以待迎接来访考察！',en:'The qualification product display mission concluded successfully. All preparations are in place, welcoming visitors for inspection!'},imgGradient:'linear-gradient(135deg,#0a1a2e,#1a3a4a,#0d2838)',imgIcon:'🎉',images:[{src:'图片/news9-pic1.jpg',caption:'正样产品展示现场'},{src:'图片/news9-pic2.jpg',caption:'团队合影留念'},{src:'图片/news9-pic3.jpg',caption:'团队合影留念'}],source:{zh:'感知起源',en:'Sensing Origin'},sourceUrl:'#',content:{zh:[{type:'p',text:'2026年6月1日，感知起源首套商业MIMOSAR载荷正样产品展示任务圆满收官。此次展示是载荷正式交付前的关键节点，全面验证了产品的设计性能与制造工艺。'},{type:'h2',text:'全员聚力 首战大捷'},{type:'p',text:'本次正样产品展示凝聚了全体研发、生产、测试团队的心血与智慧。从方案论证到正样制造，从环境试验到性能测试，每一个环节都精益求精。全员上下一心、聚力攻坚，以高标准高质量完成了各项筹备工作，实现了正样阶段的"首战大捷"。'},{type:'img',text:'🎉'},{type:'img',text:'🤝'},{type:'img',text:'🛰️'},{type:'h2',text:'迎接来访考察'},{type:'p',text:'目前，各项接待筹备工作已悉数落地，团队整装以待，迎接各级领导和合作伙伴的来访考察。此次展示将为后续的入轨验证和批量生产奠定坚实基础，标志着感知起源正朝着国内首个全自研商业SAR载荷在轨验证的目标迈出了关键一步。'},{type:'highlight',text:'感知起源首套MIMOSAR载荷正样阶段的顺利推进，不仅验证了公司的技术实力与工程能力，也为中国商业SAR载荷的国产化突破注入了强劲信心。'}]}},{id:'news-8',sort:20260000,date:{zh:'2026年',en:'2026'},badge:{zh:'产品进展',en:'Product'},title:{zh:'首套商业MIMOSAR载荷进入正样阶段',en:'First Commercial MIMOSAR Payload Enters Qualification Phase'},summary:{zh:'感知起源首套商业MIMOSAR载荷已完成研制进入正样阶段，计划年内完成入轨验证并启动批量生产。',en:'The first commercial MIMOSAR payload has entered qualification phase, scheduled for in-orbit verification and mass production.'},imgGradient:'linear-gradient(135deg,#0a1628,#1a3a5a,#0d2840)',imgIcon:'🛰️',source:{zh:'36氪 · 硬氪首发',en:'36Kr'},sourceUrl:'https://m.36kr.com/p/3681056499642245',content:{zh:[{type:'p',text:'感知起源首套商业MIMOSAR载荷已完成研制，正式进入正样阶段。按当前规划，预计2026年内完成入轨验证并启动批量生产，有望成为国内首个实现全自研商业SAR载荷在轨验证的先例。'},{type:'h2',text:'MIMOSAR技术突破'},{type:'p',text:'MIMOSAR是感知起源核心专利技术，通过多通道合成孔径与数字波束形成技术，同时实现高分辨率（优于1m）与大宽幅（＞50km）。该技术路线可突破传统SAR的物理制约，成像效率较传统SAR提升5-10倍，单位面积图像成本下降1-2个数量级。'},{type:'h2',text:'正样阶段的意义'},{type:'p',text:'在航天工程中，载荷研制通常经历：方案阶段→初样阶段→正样阶段→在轨验证。正样阶段意味着产品设计已定型，进入飞行件生产制造环节。首套商业MIMOSAR载荷入轨验证成功后，将启动批量生产，为商业遥感卫星星座建设提供核心硬件支撑。'},{type:'highlight',text:'目前国内尚无全自研商业SAR载荷成功在轨验证的先例。若感知起源首套MIMOSAR载荷验证成功，将填补国产商业化星载SAR载荷的空白。'},{type:'h2',text:'商业化前景'},{type:'p',text:'SAR卫星具备全天时、全天候对地观测能力，在国防安全、应急救灾、环境监测等领域具有不可替代的作用。感知起源通过全栈自研的商业化路径，正在打破长期依赖科研体系的格局，提供更具性价比的商业载荷解决方案。'}]}},{id:'news-7',sort:20260200,date:{zh:'2026年2月',en:'Feb 2026'},badge:{zh:'融资动态',en:'Finance'},title:{zh:'完成新一轮融资 累计融资近亿元',en:'Sensing Origin Secures Nearly ¥100M Total Funding'},summary:{zh:'由山东财金领投，厦门高新创臻、苏州里奥未来、济南财鑫共同参与，资金用于SAR载荷研发及入轨验证。',en:'Led by Shandong Caijin with multiple participants for SAR payload R&D and in-orbit verification.'},imgGradient:'linear-gradient(135deg,#0a1a2e,#1a4a6a,#0e2a3e)',imgIcon:'💰',source:{zh:'36氪、投资界',en:'36Kr, PEdaily'},sourceUrl:'https://news.pedaily.cn/202602/561037.shtml',content:{zh:[{type:'p',text:'2026年2月，济南感知起源信息科技有限公司完成新一轮数千万元融资，累计融资额近亿元。本轮融资由山东财金集团领投，厦门高新创臻、苏州里奥未来、济南财鑫股权投资共同参与，充分体现了资本市场对商业航天赛道和感知起源技术实力的高度认可。'},{type:'h2',text:'本轮融资详情'},{type:'ul',items:['领投方：山东财金集团——山东省属国有资本投资运营平台','跟投方：厦门高新创臻、苏州里奥未来、济南财鑫','累计融资：近亿元（含天使轮及天使+轮）','资金用途：首台套自研SAR载荷研发及入轨验证、新型谱产品预研、产能升级及商业拓展']},{type:'h2',text:'投资方评价'},{type:'p',text:'山东财金集团表示，感知起源团队在SAR载荷领域技术积累深厚，核心团队成员来自中科院空天院，具备多年大型雷达系统项目研发与交付经验。MIMOSAR技术路线在高分宽幅成像方面具有显著优势，有望突破传统SAR"高分辨率与大幅宽不可兼得"的物理限制，实现成像效率的量级提升。'},{type:'p',text:'感知起源创始人马兵强博士表示，本轮融资将加速首台套自研商业SAR载荷的在轨验证进程，同时启动下一代产品的预研工作。公司将继续以"小型化、低成本、高集成度"为产品理念，通过全栈自研的创新机制重构SAR载荷成本结构，提供更具性价比的商业载荷解决方案。'},{type:'p',text:'展望2026年，感知起源将全力推进首套MIMOSAR载荷的入轨验证，同时启动产品批产准备。公司已完成北京、济南、厦门三地布局，形成了覆盖研发、制造、国际业务的全链条能力，为下一步规模化发展奠定了坚实基础。'}]}},{id:'news-6',sort:20251200,date:{zh:'2025年12月',en:'Dec 2025'},badge:{zh:'战略布局',en:'Strategy'},title:{zh:'感知起源国际业务总部落地厦门集美',en:'Int\'l HQ Established in Xiamen Jimei'},summary:{zh:'感知起源正式将国际业务总部落户厦门集美区，集美产业促进基金作为战略投资方参与投资。',en:'International business HQ established in Xiamen Jimei District to support global market expansion.'},imgGradient:'linear-gradient(135deg,#0a1e2e,#1a4a5a,#0e2a3e)',imgIcon:'🌏',source:{zh:'厦门日报',en:'Xiamen Daily'},sourceUrl:'https://xm.fjsen.com/wap/2025-12/02/content_32089093.htm',content:{zh:[{type:'p',text:'2025年12月，感知起源正式将国际业务总部落户厦门集美区。厦门市集美产业促进基金作为战略投资方，参与了感知起源天使+轮融资。从初次接触到正式落地，集美区仅用了5个月时间，展现了高效的产业服务能力。'},{type:'h2',text:'为什么选择厦门'},{type:'p',text:'厦门作为中国东南沿海重要的对外开放门户，在"一带一路"建设中具有独特的区位优势。近年来，厦门市积极布局商业航天和空天信息产业，出台了涵盖人才引进、研发补贴、税收优惠等多维度的产业扶持政策。集美区作为厦门市跨岛发展的核心区域，已集聚了包括软件信息、人工智能、空天科技在内的一批创新企业，形成了良好的产业生态和创新氛围。'},{type:'p',text:'感知起源总经理鞠在强表示，厦门不仅提供了具有竞争力的政策支持，更在产业配套、人才储备、国际化通道等方面展现出独特的综合优势。集美区良好的营商环境和高效的服务团队，是公司选择将国际业务总部落地于此的重要原因。'},{type:'h2',text:'国际业务布局'},{type:'p',text:'感知起源计划以厦门国际业务总部为窗口，面向东南亚、中东、非洲等"一带一路"沿线国家拓展市场，提供SAR遥感数据服务和载荷产品解决方案。同时，国际业务总部还将承担海外技术合作、国际人才引进等功能，助力公司打造具有国际竞争力的商业SAR载荷品牌。'},{type:'p',text:'感知起源的SAR载荷技术在全天时、全天候对地观测方面具有独特优势，在海洋监视、港口监测、海上交通管理、应急减灾等国际市场领域需求旺盛。厦门独特的区位优势和开放通道，将为公司拓展海外市场提供有力支撑。'},{type:'highlight',text:'感知起源国际业务总部落户厦门集美，将借助厦门的区位优势和政策支持，推动中国自主可控的商业SAR载荷技术走向全球市场，助力厦门打造空天信息产业新高地。'}]}},{id:'news-5',sort:20251100,date:{zh:'2025年11月',en:'Nov 2025'},badge:{zh:'融资动态',en:'Finance'},title:{zh:'完成天使+轮融资 多机构联合投资',en:'Angel+ Round with Multiple Investors'},summary:{zh:'感知起源完成天使+轮融资，投资方包括源创多盈、济南科创投、福建闽招产投、阳光融汇资本、广电平云资本等。',en:'Angel+ round completed with Yuanchuang, Jinan Kechuang, Fujian Minzhao, Sunshine Ronghui, and GPDI Pingyun.'},imgGradient:'linear-gradient(135deg,#0e1628,#1a2a5a,#0e1a3e)',imgIcon:'📈',source:{zh:'投资界',en:'PEdaily'},sourceUrl:'https://news.pedaily.cn/202602/561037.shtml',content:{zh:[{type:'p',text:'2025年11月，感知起源完成天使+轮融资，由源创多盈集团、济南科创投、福建闽招产投、阳光融汇资本、广电平云资本、集美区产业促进基金等多家机构联合投资。这是公司在天使轮融资基础上的进一步资金加持，体现了多元资本对商业航天赛道的一致看好。'},{type:'p',text:'公司年内规划了多笔融资计划，每笔均超千万元，以确保公司运行的绝对安全、为团队提供稳定的工作环境，同时为研发团队提供充足的研发资金。天使轮及天使+轮融资的接连完成，为感知起源首套商业MIMOSAR载荷的研制与验证提供了坚实的资金保障。'},{type:'h2',text:'投资方阵容'},{type:'ul',items:['源创多盈集团——专注于科技创新领域的投资机构','济南科创投——济南市科技创业投资平台','福建闽招产投——福建省招标采购集团产业投资平台','阳光融汇资本——阳光保险集团旗下专业投资机构','广电平云资本——广州无线电集团旗下资本平台','集美区产业促进基金——厦门市集美区产业引导基金','山东财金资本——山东省属国有资本投资运营平台（天使轮）','厦门高新创臻——厦门高新投旗下投资平台（天使轮）','苏州里奥未来——产业投资机构','济南市中区政投——地方政府投资平台']},{type:'h2',text:'研发进展与资金用途'},{type:'p',text:'本轮融资资金继续用于首台套自研商业SAR载荷的研制工作及入轨验证。在天使轮及天使+轮融资的支持下，感知起源团队迅速推进了原型验证和关键技术攻关。核心MIMOSAR技术取得突破性进展，多通道合成孔径与数字波束形成技术的联调验证顺利完成，成像指标达到设计预期，为首套载荷进入正样阶段奠定了坚实基础。'},{type:'p',text:'同时，资金也用于公司在北京、济南、厦门三地的研发与运营布局，以及下一代产品的预研和商业拓展。感知起源已在厦门设立国际业务总部，形成了覆盖研发、制造、国际业务的全链条能力。'},{type:'h2',text:'鞠在强博士谈融资'},{type:'p',text:'感知起源总经理鞠在强博士表示："多家知名投资机构的加入，是对感知起源技术路线和商业化前景的高度认可。志合者，不以山海为远。我们将持续努力，做出一流的设备，成为行业明星。"他指出，融资工作的持续推进将帮助公司进一步扩大优势，力争早日实现国产商业SAR载荷的在轨验证。'},{type:'highlight',text:'感知起源全年完成多笔超千万融资，累计融资额近亿元，充分体现了资本市场对公司技术实力与商业化前景的坚定信心。'}]}},{id:'news-4',sort:20250800,date:{zh:'2025年8月',en:'Aug 2025'},badge:{zh:'产业布局',en:'Industry'},title:{zh:'招福创新基金首个项目落地感知起源',en:'Zhaofu Fund\'s First Investment in Sensing Origin'},summary:{zh:'福建省招标采购集团旗下招福创新基金成功投资感知起源，以福建省"海丝星座"为切入点。',en:'Fujian Tendering Group\'s Zhaofu Fund invested in Sensing Origin as its debut project.'},imgGradient:'linear-gradient(135deg,#0a1628,#162a4a,#0e1e3e)',imgIcon:'🎯',source:{zh:'福建省国资委',en:'Fujian SASAC'},sourceUrl:'http://gzw.fujian.gov.cn/zwgk/gzdt/gzyw/fjszbcgjtyxgs_31457/202508/t20250815_6991620.htm',content:{zh:[{type:'p',text:'2025年8月，福建省招标采购集团旗下招福创新基金首个项目成功落地——完成对感知起源的战略投资。这是福建省在商业航天和空天信息产业的重要布局，也是招福创新基金成立以来的首个对外投资项目。'},{type:'h2',text:'"海丝星座"战略'},{type:'p',text:'福建省正积极推进"海丝星座"建设，以海洋经济和"一带一路"为特色，构建覆盖海上丝绸之路沿线区域的遥感卫星星座。感知起源的SAR载荷技术是"海丝星座"建设的核心支撑之一。感知起源的SAR载荷具有小型化、低成本、高集成度的特点，可有效解决目前SAR载荷价格高、分辨率低的行业痛点，为"海丝星座"提供核心硬件支撑。'},{type:'h2',text:'产业协同效应'},{type:'p',text:'此次投资不仅是财务投资，更是产业协同的战略合作。感知起源将借助福建省在海洋经济和"一带一路"建设中的独特优势，推动SAR载荷技术在海洋监视、港口监测、海上交通管理等领域的应用落地。同时，福建省的航天信息产业生态也将为感知起源提供丰富的上下游合作资源和市场渠道。'},{type:'highlight',text:'感知起源SAR载荷全天时、全天候对地观测能力，与福建省"海丝星座"战略高度契合，在海洋监视、应急减灾等领域具有独特优势。'}]}},{id:'news-3',sort:20240000,date:{zh:'2024年',en:'2024'},badge:{zh:'融资动态',en:'Finance'},title:{zh:'获奇绩创坛种子轮投资 启动SAR载荷研发',en:'Seed Round from MiraclePlus for SAR Payload R&D'},summary:{zh:'感知起源获得奇绩创坛（MiraclePlus）种子轮投资，正式启动星载SAR载荷原型研发工作。',en:'Sensing Origin secured seed funding from MiraclePlus to commence SAR payload prototype development.'},imgGradient:'linear-gradient(135deg,#0e1628,#1a2a4a,#0e1e3e)',imgIcon:'🌱',source:{zh:'投资界',en:'PEdaily'},sourceUrl:'https://vc.pedaily.cn/company/613991.html',content:{zh:[{type:'p',text:'2024年，感知起源获得奇绩创坛（MiraclePlus）种子轮投资，正式启动星载SAR载荷原型研发工作。这是公司成立后获得的首笔机构投资，标志着感知起源商业航天征程的正式开启。'},{type:'h2',text:'奇绩创坛'},{type:'p',text:'奇绩创坛由前YC中国创始人、著名AI科学家陆奇博士创立，是国内领先的早期创业投资和加速器机构。奇绩创坛专注于投资具有核心技术壁垒的硬科技公司，在AI、航天、半导体等前沿科技领域有深入布局。获得奇绩创坛的种子轮投资，不仅为感知起源提供了启动资金，更带来了创业方法论和行业资源的有力支持。'},{type:'h2',text:'早期研发突破'},{type:'p',text:'在种子轮融资的支持下，感知起源团队迅速完成了多项关键技术突破：MIMOSAR核心技术方案的可行性验证顺利完成，相控阵天线单元完成了初步设计和仿真验证，地面成像处理系统的算法原型开发取得阶段性成果。这些早期成果为后续的产品化和多轮融资奠定了坚实的技术基础。'},{type:'p',text:'创始人马兵强博士表示，种子轮的快速推进验证了团队的技术路线选择，也增强了团队对MIMOSAR技术商业化前景的信心。公司随即启动了天使轮融资，为下一阶段的原型样机研制和工程化开发做准备。'}]}},{id:'news-2',sort:20230920,date:{zh:'2023年9月',en:'Sep 2023'},badge:{zh:'公司里程碑',en:'Milestone'},title:{zh:'济南感知起源信息科技有限公司正式成立',en:'Jinan Sensing Origin Officially Founded'},summary:{zh:'济南感知起源信息科技有限公司在山东省济南市市中区正式注册成立，核心团队来自中科院空天院。',en:'Jinan Sensing Origin was registered in Jinan, Shandong, led by CAS aerospace radar experts.'},imgGradient:'linear-gradient(135deg,#0a1628,#0d2840,#061828)',imgIcon:'🚀',source:{zh:'启信宝',en:'Qixin'},sourceUrl:'https://m.qixin.com/company/89604498-760c-4b70-9975-95c75846b457',content:{zh:[{type:'p',text:'2023年9月20日，济南感知起源信息科技有限公司在山东省济南市市中区正式注册成立，是国内首家专注于商业星载合成孔径雷达（SAR）载荷研发、生产与销售的民营企业。公司注册地址位于济南市市中区英雄山路129号祥泰广场，初期核心团队由来自中国科学院空天信息创新研究院的资深专家组成。'},{type:'h2',text:'核心团队'},{type:'ul',items:['马兵强博士——创始人兼董事长、总师。中科院空天院SAR系统及信号处理专业博士，具备多年大型雷达系统项目研发与交付经验，全面负责公司技术战略与产品研发','鞠在强博士——联合创始人兼总经理。资深商业航天从业者，国内首颗商业SAR卫星"海丝一号"项目负责人，拥有丰富的商业航天项目管理与产业协同经验']},{type:'h2',text:'公司使命与愿景'},{type:'p',text:'感知起源以"感知数据、创新价值"为使命，致力于成为国内首家全自研商业SAR载荷制造商，填补国产化空白。公司以小型化、低成本、高集成度为产品理念，通过全栈自研的创新机制重构SAR载荷成本结构，提供更富性价比、更适应规模化生产的商业载荷解决方案。'},{type:'p',text:'济南总部的成立标志着感知起源正式从北京研发基地走向产业化。公司在北京已完成前期技术积累和核心团队组建，济南总部则聚焦于载荷制造、集成测试和商业运营，形成了"北京研发+济南制造"的双轮驱动格局。'},{type:'highlight',text:'SAR载荷作为SAR卫星的核心分系统，负责收发微波信号并进行成像处理，相当于SAR卫星的「眼睛+大脑」。感知起源立志打造自主可控的商业SAR载荷，共建天基遥感信息基础设施。'}]}},{id:'news-1',sort:20210618,date:{zh:'2021年6月',en:'Jun 2021'},badge:{zh:'公司里程碑',en:'Milestone'},title:{zh:'北京感知起源科技有限公司成立',en:'Beijing Sensing Origin Technology Founded'},summary:{zh:'北京感知起源科技有限公司在北京市海淀区注册成立，是国内首家专注商业星载SAR系统的硬科技公司。',en:'Beijing Sensing Origin was founded in Haidian, Beijing as China\'s first commercial SAR system company.'},imgGradient:'linear-gradient(135deg,#0a1628,#1a1a3a,#0e0e28)',imgIcon:'🌟',source:{zh:'启信宝',en:'Qixin'},sourceUrl:'https://m.qixin.com/company/d358286f-cb95-4964-89e6-0cbc62a0f7a7',content:{zh:[{type:'p',text:'2021年6月18日，北京感知起源科技有限公司在北京市海淀区海淀大街31号正式注册成立，是国内首家专注于商业星载SAR系统（合成孔径雷达）研发的硬科技公司。公司选址于中关村核心区域，充分利用北京在航天领域的科研人才资源和产业生态优势，为公司后续发展奠定了坚实的区位基础。'},{type:'h2',text:'从北京到济南：双总部格局'},{type:'p',text:'感知起源采取了"北京+济南"双总部模式，形成了覆盖研发、制造、运营的全链条能力：'},{type:'ul',items:['北京总部（2021年成立）：北京市海淀区中关村，聚焦技术研发、系统设计与品牌建设，发挥北京的科研人才优势和航天产业生态','济南总部（2023年成立）：济南市市中区，聚焦载荷制造、产业化与商业运营，承接北京研发成果的工程化与规模化生产']},{type:'h2',text:'早期探索与技术积累'},{type:'p',text:'北京公司成立后，核心团队立即展开了星载SAR载荷技术的早期探索与预研工作。以创始人马兵强博士为核心的技术团队，基于在中科院空天院多年的技术积累，完成了MIMOSAR技术路线的概念验证与方案设计。这一阶段的技术探索为后续成立济南产业化基地、启动产品研制奠定了坚实的理论和工程基础。'},{type:'p',text:'2021年至2023年间，团队完成了核心算法开发、系统方案设计和关键元器件选型等前期工作，并初步完成了相控阵天线系统的原理验证。同时，团队积极与潜在客户和合作伙伴建立联系，为后续的市场拓展做好了准备。'},{type:'highlight',text:'感知起源以北京为技术策源地、济南为产业化基地，形成了覆盖研发、制造、运营的全链条能力，是国内商业SAR载荷赛道的先行者和探索者。'}]}}];

        // 搜索过滤
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            data = data.filter(function(item) {
                return item.title.zh.toLowerCase().indexOf(q) !== -1 ||
                       item.title.en.toLowerCase().indexOf(q) !== -1 ||
                       item.summary.zh.toLowerCase().indexOf(q) !== -1 ||
                       item.summary.en.toLowerCase().indexOf(q) !== -1 ||
                       item.date.zh.indexOf(q) !== -1;
            });
        }
        // 按日期排序（sort字段 YYYYMMDD）
        data.sort(function(a, b) {
            return sortAscending ? a.sort - b.sort : b.sort - a.sort;
        });
        return data;
    }

    function renderList() {
        var html = '', lang = currentLang;
        var filtered = getFilteredData();
        for (var i = 0; i < filtered.length; i++) {
            var item = filtered[i];
            html += '<div class="news-card" data-id="' + item.id + '">';
            html += '<div class="card-img">';
            if (item.images && item.images[0]) {
                html += '<img src="' + item.images[0].src + '" alt="' + item.images[0].caption + '" style="width:100%;height:100%;object-fit:cover;display:block">';
            } else {
                html += '<div class="img-visual" style="background:' + item.imgGradient + '">' + item.imgIcon + '</div>';
            }
            html += '<div class="img-overlay"></div><div class="card-date">' + item.date[lang] + '</div></div>';
            html += '<div class="card-body"><div class="card-badge">' + item.badge[lang] + '</div><h3>' + item.title[lang] + '</h3><p>' + item.summary[lang] + '</p>';
            html += '<div class="card-footer"><span class="card-source">' + (lang==='zh'?'来源：':'Source: ') + item.source[lang] + '</span><span class="card-readmore">' + i18nData[lang].readMore + '</span></div></div></div>';
        }
        newsGrid.innerHTML = html;
        newsGrid.querySelectorAll('.news-card').forEach(function(c) {
            c.addEventListener('click', function() { window.location.hash = this.getAttribute('data-id'); });
        });
    }

    function updateCount() {
        var total = newsData.length;
        var shown = getFilteredData().length;
        var txt = i18nData[currentLang].count.replace('{n}', total);
        if (shown !== total) txt += ' （显示 ' + shown + ' 条）';
        newsCountEl.textContent = txt;
    }

    function renderDetail(id) {
        var item = null, index = -1;
        for (var i = 0; i < newsData.length; i++) {
            if (newsData[i].id === id) { item = newsData[i]; index = i; break; }
        }
        if (!item) return;
        var lang = currentLang, t = i18nData[lang];
        var content = item.content[lang] || item.content['zh'];
        var html = '<div class="detail-header"><div class="detail-badge">' + item.badge[lang] + '</div><div class="detail-date">' + item.date[lang] + '</div><h1>' + item.title[lang] + '</h1><div class="detail-source">' + t.source + '：<a href="' + item.sourceUrl + '" target="_blank">' + item.source[lang] + '</a></div></div>';
        // Hero图：有真实图片就用第一张
        if (item.images && item.images[0]) {
            html += '<div class="detail-hero-img" style="overflow:hidden"><img src="' + item.images[0].src + '" alt="' + item.images[0].caption + '" style="width:100%;height:100%;object-fit:cover"></div>';
        } else {
            html += '<div class="detail-hero-img" style="background:' + item.imgGradient + '"><div class="img-visual">' + item.imgIcon + '</div></div>';
        }
        // 正文
        html += '<div class="detail-body">';
        if (content) {
            var imgIdx = 0;
            for (var ci = 0; ci < content.length; ci++) {
                var b = content[ci];
                if (b.type === 'p') html += '<p>' + b.text + '</p>';
                else if (b.type === 'h2') html += '<h2>' + b.text + '</h2>';
                else if (b.type === 'ul') { html += '<ul>'; for (var ui = 0; ui < b.items.length; ui++) html += '<li>' + b.items[ui] + '</li>'; html += '</ul>'; }
                else if (b.type === 'highlight') html += '<div class="highlight-box">' + b.text + '</div>';
                else if (b.type === 'img') {
                    var imgData = item.images && item.images[imgIdx] ? item.images[imgIdx] : null;
                    if (imgData) {
                        html += '<div class="img-inline" style="overflow:hidden"><img src="' + imgData.src + '" alt="' + (imgData.caption||'') + '" style="width:100%;height:100%;object-fit:cover;display:block">' + (imgData.caption ? '<div class="img-caption">' + imgData.caption + '</div>' : '') + '</div>';
                    } else {
                        html += '<div class="img-inline" style="background:' + item.imgGradient + '"><div class="img-visual" style="font-size:2.5rem">' + b.text + '</div></div>';
                    }
                    imgIdx++;
                }
            }
        }
        html += '</div>';
        detailContent.innerHTML = html;

        var navHtml = '';
        if (index - 1 >= 0) {
            var n = newsData[index - 1];
            navHtml += '<button class="detail-nav-btn" onclick="window.location.hash=\'' + n.id + '\'"><span class="nav-arrow">←</span><div><div class="nav-text">' + t.prev + '</div><div class="nav-title">' + n.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        if (index + 1 < newsData.length) {
            var p = newsData[index + 1];
            navHtml += '<button class="detail-nav-btn next" onclick="window.location.hash=\'' + p.id + '\'"><span class="nav-arrow">→</span><div><div class="nav-text">' + t.next + '</div><div class="nav-title">' + p.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        detailNav.innerHTML = navHtml;

        listView.style.display = 'none';
        detailView.classList.add('active');
        window.scrollTo({ top: 0 });
    }

    function showList() {
        detailView.classList.remove('active');
        listView.style.display = 'block';
        window.location.hash = '';
        window.scrollTo({ top: 0 });
    }

    function handleHash() {
        var hash = window.location.hash.replace('#', '');
        if (hash && hash.startsWith('news-')) renderDetail(hash);
        else showList();
    }

    var sortBtn = document.getElementById('sortBtn');
    var searchInput = document.getElementById('searchInput');

    function updateSortBtn() {
        var t = i18nData[currentLang];
        sortBtn.innerHTML = (sortAscending ? '↑ ' : '↓ ') + (sortAscending ? t.sortOldest : t.sortNewest);
    }

    sortBtn.addEventListener('click', function() {
        sortAscending = !sortAscending;
        updateSortBtn();
        renderList();
        updateCount();
    });

    searchInput.addEventListener('input', function() {
        searchQuery = this.value;
        renderList();
        updateCount();
    });

    window.addEventListener('hashchange', handleHash);
    themeBtn.addEventListener('click', toggleTheme);
    langBtn.addEventListener('click', toggleLang);
    detailBack.addEventListener('click', showList);

    applyTheme(safeGet('so-news-theme') || 'dark');
    applyLang(safeGet('so-news-lang') || 'zh');
    renderList();
    updateCount();
    updateSortBtn();
    handleHash();
    setTimeout(function() { if (loader) loader.style.display = 'none'; }, 200);
})();
</script>
</body>
</html>
