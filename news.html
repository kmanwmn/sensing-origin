<script>
(function() {
    var newsData = [{id:'news-8',date:{zh:'2026年',en:'2026'},badge:{zh:'产品进展',en:'Product'},title:{zh:'首套商业MIMOSAR载荷进入正样阶段',en:'First Commercial MIMOSAR Payload Enters Qualification Phase'},summary:{zh:'感知起源首套商业MIMOSAR载荷已完成研制进入正样阶段，计划年内完成入轨验证并启动批量生产。',en:'The first commercial MIMOSAR payload has entered qualification phase, scheduled for in-orbit verification and mass production.'},imgGradient:'linear-gradient(135deg,#0a1628,#1a3a5a,#0d2840)',imgIcon:'🛰️',source:{zh:'36氪 · 硬氪首发',en:'36Kr'},sourceUrl:'https://m.36kr.com/p/3681056499642245',content:{zh:[{type:'p',text:'感知起源首套商业MIMOSAR载荷已完成研制，正式进入正样阶段。按当前规划，预计2026年内完成入轨验证并启动批量生产，有望成为国内首个实现全自研商业SAR载荷在轨验证的先例。'},{type:'h2',text:'MIMOSAR技术突破'},{type:'p',text:'MIMOSAR是感知起源核心专利技术，通过多通道合成孔径与数字波束形成技术，同时实现高分辨率（优于1m）与大宽幅（＞50km）。该技术路线可突破传统SAR的物理制约，成像效率较传统SAR提升5-10倍，单位面积图像成本下降1-2个数量级。'},{type:'h2',text:'正样阶段的意义'},{type:'p',text:'在航天工程中，载荷研制通常经历：方案阶段→初样阶段→正样阶段→在轨验证。正样阶段意味着产品设计已定型，进入飞行件生产制造环节。首套商业MIMOSAR载荷入轨验证成功后，将启动批量生产，为商业遥感卫星星座建设提供核心硬件支撑。'},{type:'highlight',text:'目前国内尚无全自研商业SAR载荷成功在轨验证的先例。若感知起源首套MIMOSAR载荷验证成功，将填补国产商业化星载SAR载荷的空白。'},{type:'h2',text:'商业化前景'},{type:'p',text:'SAR卫星具备全天时、全天候对地观测能力，在国防安全、应急救灾、环境监测等领域具有不可替代的作用。感知起源通过全栈自研的商业化路径，正在打破长期依赖科研体系的格局，提供更具性价比的商业载荷解决方案。'}]}},{id:'news-7',date:{zh:'2026年2月',en:'Feb 2026'},badge:{zh:'融资动态',en:'Finance'},title:{zh:'完成新一轮融资 累计融资近亿元',en:'Sensing Origin Secures Nearly ¥100M Total Funding'},summary:{zh:'由山东财金领投，厦门高新创臻、苏州里奥未来、济南财鑫共同参与，资金用于SAR载荷研发及入轨验证。',en:'Led by Shandong Caijin with multiple participants for SAR payload R&D and in-orbit verification.'},imgGradient:'linear-gradient(135deg,#0a1a2e,#1a4a6a,#0e2a3e)',imgIcon:'💰',source:{zh:'36氪、投资界',en:'36Kr, PEdaily'},sourceUrl:'https://news.pedaily.cn/202602/561037.shtml',content:{zh:[{type:'p',text:'2026年2月，济南感知起源信息科技有限公司完成新一轮数千万元融资，累计融资额近亿元。本轮融资由山东财金集团领投，厦门高新创臻、苏州里奥未来、济南财鑫股权投资共同参与。'},{type:'h2',text:'本轮融资详情'},{type:'ul',items:['领投方：山东财金集团','跟投方：厦门高新创臻、苏州里奥未来、济南财鑫','累计融资：近亿元（含天使轮及天使+轮）','资金用途：首台套自研SAR载荷研发及入轨验证、新型谱产品预研']},{type:'h2',text     var i18nData = {
        zh: {newsTag:'News & Milestones',newsTitle:'新闻',newsTitleHL:'动态',newsSub:'感知起源的发展足迹——从创立起步到技术突破，从融资里程碑到产业布局',backHome:'← 返回首页',backList:'返回新闻列表',count:'共 {n} 条新闻',readMore:'阅读全文 →',prev:'上一篇',next:'下一篇',loader:'感知起源 · 加载中',source:'来源'},
        en: {newsTag:'News & Milestones',newsTitle:'News &',newsTitleHL:'Milestones',newsSub:"Sensing Origin's journey — from founding to technology breakthroughs, funding milestones, and global expansion.",backHome:'← Home',backList:'Back to News',count:'{n} articles',readMore:'Read More →',prev:'Previous',next:'Next',loader:'Sensing Origin · Loading',source:'Source'}
    };

    var currentLang = 'zh';
    var currentTheme = 'dark';
    var listView = document.getElementById('listView');
    var detailView = document.getElementById('detailView');
    var newsGrid = document.getElementById('newsGrid');
    var detailContent = document.getElementById('detailContent');
    var detailNav = document.getElementById('detailNav');
    var detailBack = document.getElementById('detailBack');
    var themeBtn = document.getElementById('themeToggle');
    var langBtn = document.getElementById('langToggle');
    var loader = document.getElementById('pageLoader');
    var newsCountEl = document.getElementById('newsCount');

    function applyLang(lang) {
        currentLang = lang;
        document.body.setAttribute('data-lang', lang);
        langBtn.textContent = lang === 'zh' ? 'EN' : '中';
        var t = i18nData[lang];
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            if (t[key] !== undefined) el.innerHTML = t[key];
        });
        renderList();
        updateCount();
        if (detailView.classList.contains('active')) {
            var hash = window.location.hash.replace('#', '');
            if (hash) renderDetail(hash);
        }
        localStorage.setItem('so-news-lang', lang);
    }

    function applyTheme(theme) {
        currentTheme = theme;
        document.body.classList.toggle('light-theme', theme === 'light');
        themeBtn.innerHTML = theme === 'light' ? '&#x2600;' : '&#x263E;';
        localStorage.setItem('so-news-theme', theme);
    }

    function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    function toggleLang() { applyLang(currentLang === 'zh' ? 'en' : 'zh'); }

    function renderList() {
        var html = '', lang = currentLang;
        for (var i = newsData.length - 1; i >= 0; i--) {
            var item = newsData[i];
            html += '<div class="news-card" data-id="' + item.id + '">';
            html += '<div class="card-img"><div class="img-visual" style="background:' + item.imgGradient + '">' + item.imgIcon + '</div><div class="img-overlay"></div><div class="card-date">' + item.date[lang] + '</div></div>';
            html += '<div class="card-body"><div class="card-badge">' + item.badge[lang] + '</div><h3>' + item.title[lang] + '</h3><p>' + item.summary[lang] + '</p>';
            html += '<div class="card-footer"><span class="card-source">' + (lang==='zh'?'来源：':'Source: ') + item.source[lang] + '</span><span class="card-readmore">' + i18nData[lang].readMore + '</span></div></div></div>';
        }
        newsGrid.innerHTML = html;
        newsGrid.querySelectorAll('.news-card').forEach(function(c) {
            c.addEventListener('click', function() { window.location.hash = this.getAttribute('data-id'); });
        });
    }

    function updateCount() {
        newsCountEl.textContent = i18nData[currentLang].count.replace('{n}', newsData.length);
    }

    function renderDetail(id) {
        var item = null, index = -1;
        for (var i = 0; i < newsData.length; i++) {
            if (newsData[i].id === id) { item = newsData[i]; index = i; break; }
        }
        if (!item) return;
        var lang = currentLang, t = i18nData[lang], content = item.content[lang];
        var html = '<div class="detail-header"><div class="detail-badge">' + item.badge[lang] + '</div><div class="detail-date">' + item.date[lang] + '</div><h1>' + item.title[lang] + '</h1><div class="detail-source">' + t.source + '：<a href="' + item.sourceUrl + '" target="_blank">' + item.source[lang] + '</a></div></div>';
        html += '<div class="detail-hero-img" style="background:' + item.imgGradient + '"><div class="img-visual">' + item.imgIcon + '</div></div>';
        html += '<div class="detail-body">';
        if (content) for (var ci = 0; ci < content.length; ci++) {
            var b = content[ci];
            if (b.type === 'p') html += '<p>' + b.text + '</p>';
            else if (b.type === 'h2') html += '<h2>' + b.text + '</h2>';
            else if (b.type === 'ul') { html += '<ul>'; for (var ui = 0; ui < b.items.length; ui++) html += '<li>' + b.items[ui] + '</li>'; html += '</ul>'; }
            else if (b.type === 'highlight') html += '<div class="highlight-box">' + b.text + '</div>';
        }
        html += '</div>';
        detailContent.innerHTML = html;

        var navHtml = '';
        if (index + 1 < newsData.length) {
            var p = newsData[index + 1];
            navHtml += '<button class="detail-nav-btn" onclick="window.location.hash=\'' + p.id + '\'"><span class="nav-arrow">←</span><div><div class="nav-text">' + t.prev + '</div><div class="nav-title">' + p.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        if (index - 1 >= 0) {
            var n = newsData[index - 1];
            navHtml += '<button class="detail-nav-btn next" onclick="window.location.hash=\'' + n.id + '\'"><span class="nav-arrow">→</span><div><div class="nav-text">' + t.next + '</div><div class="nav-title">' + n.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        detailNav.innerHTML = navHtml;

        listView.style.display = 'none';
        detailView.classList.add('active');
        window.scrollTo({ top: 0 });
    }

    function showList() {
        detailView.classList.remove('active');
        listView.style.display = 'block';
        window.location.hash = '';
        window.scrollTo({ top: 0 });
    }

    function handleHash() {
        var hash = window.location.hash.replace('#', '');
        if (hash && hash.startsWith('news-')) renderDetail(hash);
        else showList();
    }

    window.addEventListener('hashchange', handleHash);
    themeBtn.addEventListener('click', toggleTheme);
    langBtn.addEventListener('click', toggleLang);
    detailBack.addEventListener('click', showList);

    applyTheme(localStorage.getItem('so-news-theme') || 'dark');
    applyLang(localStorage.getItem('so-news-lang') || 'zh');
    renderList();
    updateCount();
    handleHash();
    setTimeout(function() { if (loader) loader.style.display = 'none'; }, 200);
