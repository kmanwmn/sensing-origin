    // ==========================================
    // DOM引用
    // ==========================================
    var listView = document.getElementById('listView');
    var detailView = document.getElementById('detailView');
    var newsGrid = document.getElementById('newsGrid');
    var detailContent = document.getElementById('detailContent');
    var detailNav = document.getElementById('detailNav');
    var detailBack = document.getElementById('detailBack');
    var loader = document.getElementById('pageLoader');

    // ==========================================
    // 渲染新闻列表
    // ==========================================
    function renderList() {
        var html = '';
        for (var i = newsData.length - 1; i >= 0; i--) {
            var item = newsData[i];
            html += '<div class="news-card" data-id="' + item.id + '" onclick="window.openNews(\'' + item.id + '\')">';
            html += '<div class="card-img">';
            html += '<div class="img-placeholder" style="background:' + item.imgGradient + '">' + item.imgIcon + '</div>';
            html += '<div class="img-overlay"></div>';
            html += '<div class="card-date">' + item.date + '</div>';
            html += '</div>';
            html += '<div class="card-body">';
            html += '<div class="card-badge">' + item.badge + '</div>';
            html += '<h3>' + item.title + '</h3>';
            html += '<p>' + item.summary + '</p>';
            html += '<div class="card-footer">';
            html += '<span class="card-source">' + item.source + '</span>';
            html += '<span class="card-readmore">阅读全文 →</span>';
            html += '</div></div></div>';
        }
        newsGrid.innerHTML = html;
    }

    // ==========================================
    // 渲染详情页
    // ==========================================
    function renderDetail(id) {
        var item = null;
        var index = -1;
        for (var i = 0; i < newsData.length; i++) {
            if (newsData[i].id === id) {
                item = newsData[i];
                index = i;
                break;
            }
        }
        if (!item) return;

        // 内容渲染
        var contentHtml = '';

        // 头部
        contentHtml += '<div class="detail-header">';
        contentHtml += '<div class="detail-badge">' + item.badge + '</div>';
        contentHtml += '<div class="detail-date">' + item.date + '</div>';
        contentHtml += '<h1>' + item.title + '</h1>';
        contentHtml += '<div class="detail-source">来源：<a href="' + item.sourceUrl + '" target="_blank" rel="noopener">' + item.source + '</a></div>';
        contentHtml += '</div>';

        // hero图
        contentHtml += '<div class="detail-hero-img" style="background:' + item.imgGradient + '">';
        contentHtml += '<div class="img-placeholder" style="font-size:5rem">' + item.imgIcon + '</div>';
        contentHtml += '</div>';

        // 正文
        contentHtml += '<div class="detail-body">';
        for (var ci = 0; ci < item.content.length; ci++) {
            var block = item.content[ci];
            if (block.type === 'p') {
                contentHtml += '<p>' + block.text + '</p>';
            } else if (block.type === 'h2') {
                contentHtml += '<h2>' + block.text + '</h2>';
            } else if (block.type === 'h3') {
                contentHtml += '<h3>' + block.text + '</h3>';
            } else if (block.type === 'ul') {
                contentHtml += '<ul>';
                for (var ui = 0; ui < block.items.length; ui++) {
                    contentHtml += '<li>' + block.items[ui] + '</li>';
                }
                contentHtml += '</ul>';
            } else if (block.type === 'img') {
                contentHtml += '<div class="img-inline" style="background:' + item.imgGradient + '">';
                contentHtml += '<div style="font-size:3rem">' + item.imgIcon + '</div>';
                if (block.caption) {
                    contentHtml += '<div class="img-caption">' + block.caption + '</div>';
                }
                contentHtml += '</div>';
            } else if (block.type === 'highlight') {
                contentHtml += '<div class="highlight-box">' + block.text + '</div>';
            }
        }
        contentHtml += '</div>';
        detailContent.innerHTML = contentHtml;

        // 上下篇导航
        var navHtml = '';
        var prevIndex = index - 1;
        var nextIndex = index + 1;

        if (prevIndex >= 0) {
            navHtml += '<button class="detail-nav-btn" onclick="window.openNews(\'' + newsData[prevIndex].id + '\')">';
            navHtml += '<span class="nav-arrow">←</span>';
            navHtml += '<div><div class="nav-text">上一篇</div><div class="nav-title">' + newsData[prevIndex].title + '</div></div>';
            navHtml += '</button>';
        } else {
            navHtml += '<div></div>';
        }

        if (nextIndex < newsData.length) {
            navHtml += '<button class="detail-nav-btn next" onclick="window.openNews(\'' + newsData[nextIndex].id + '\')">';
            navHtml += '<span class="nav-arrow">→</span>';
            navHtml += '<div><div class="nav-text">下一篇</div><div class="nav-title">' + newsData[nextIndex].title + '</div></div>';
            navHtml += '</button>';
        } else {
            navHtml += '<div></div>';
        }

        detailNav.innerHTML = navHtml;

        // 切换视图
        listView.style.display = 'none';
        detailView.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==========================================
    // 返回列表
    // ==========================================
    function showList() {
        detailView.classList.remove('active');
        listView.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==========================================
    // 暴露全局
    // ==========================================
    window.openNews = renderDetail;
    detailBack.addEventListener('click', showList);

    // ==========================================
    // URL Hash 路由
    // ==========================================
    function handleHash() {
        var hash = window.location.hash.replace('#', '');
        if (hash && hash.startsWith('news-')) {
            renderDetail(hash);
        } else {
            showList();
        }
    }
    window.addEventListener('hashchange', handleHash);

    // ==========================================
    // 初始化
    // ==========================================
    renderList();
    handleHash();

    // 页面加载动画
    setTimeout(function() {
        if (loader) loader.style.display = 'none';
    }, 300);
})();
</script>
