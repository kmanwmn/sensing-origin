<script>
(function() {
    var newsData = [];

    // API 配置 — 部署时改成实际服务器地址
    var API_BASE_URL = 'http://124.223.88.48:5000';

    // 从 API 加载新闻数据，失败时保持空数组（显示空状态）
    function loadNewsFromAPI() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_BASE_URL + '/api/news', true);
        xhr.timeout = 8000;
        xhr.onload = function() {
            if (xhr.status === 200) {
                try {
                    var list = JSON.parse(xhr.responseText);
                    if (list && list.length > 0) {
                        // 转换 API 扁平结构为前端嵌套格式
                        newsData = list.map(function(item) {
                            // images: API 存的是字符串数组 ["a.jpg","b.jpg"] 或对象数组
                            var imgs = item.images;
                            if (!imgs || !Array.isArray(imgs)) imgs = [];
                            imgs = imgs.map(function(img) {
                                return typeof img === 'string' ? {src:img,caption:''} : img;
                            });
                            return {
                                id: 'news-' + item.id,
                                sort: item.sort || 0,
                                date: {zh:item.date_zh||'', en:item.date_en||''},
                                badge: {zh:item.badge_zh||'', en:item.badge_en||''},
                                title: {zh:item.title_zh||'', en:item.title_en||''},
                                summary: {zh:item.summary_zh||'', en:item.summary_en||''},
                                imgGradient: item.imgGradient || 'linear-gradient(135deg,#0a1628,#1a2a4a,#0d1e38)',

    var i18nData = {
        zh: {newsTag:'News & Milestones',newsTitle:'新闻',newsTitleHL:'动态',newsSub:'感知起源的发展足迹——从创立起步到技术突破，从融资里程碑到产业布局',backHome:'← 返回首页',backList:'返回新闻列表',count:'共 {n} 条新闻',readMore:'阅读全文 →',prev:'上一篇',next:'下一篇',loader:'感知起源 · 加载中',source:'来源',sortNewest:'最新优先',sortOldest:'最早优先',searchPH:'搜索新闻标题...'},
        en: {newsTag:'News & Milestones',newsTitle:'News &',newsTitleHL:'Milestones',newsSub:"Sensing Origin's journey — from founding to technology breakthroughs, funding milestones, and global expansion.",backHome:'← Home',backList:'Back to News',count:'{n} articles',readMore:'Read More →',prev:'Previous',next:'Next',loader:'Sensing Origin · Loading',source:'Source',sortNewest:'Newest First',sortOldest:'Oldest First',searchPH:'Search news...'}

    var currentLang = 'zh';
    var currentTheme = 'dark';

    function safeGet(key, def) {
        try { var v = localStorage.getItem(key); return v !== null ? v : def; }
        catch(e) { return def; }
    }
    function safeSet(key, val) {
        try { localStorage.setItem(key, val); }
        catch(e) {}
    }

    function applyLang(lang) {
        currentLang = lang;
        document.body.setAttribute('data-lang', lang);
        langBtn.textContent = lang === 'zh' ? 'EN' : '中';
        var t = i18nData[lang];
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            if (t[key] !== undefined) el.innerHTML = t[key];
        });
        renderList();
        updateCount();
        if (detailView.classList.contains('active')) {
            var hash = window.location.hash.replace('#', '');
            if (hash) renderDetail(hash);
        }
        safeSet('so-news-lang', lang);
    }

    function applyTheme(theme) {
        currentTheme = theme;
        document.body.classList.toggle('light-theme', theme === 'light');
        themeBtn.innerHTML = theme === 'light' ? '&#x2600;' : '&#x263E;';
        safeSet('so-news-theme', theme);
    }

    function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    function toggleLang() { applyLang(currentLang === 'zh' ? 'en' : 'zh'); }

    var sortAscending = false;
    var searchQuery = '';

    function getFilteredData() {
        var data = newsData.slice(); // 复制
        // 搜索过滤
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            data = data.filter(function(item) {
                return item.title.zh.toLowerCase().indexOf(q) !== -1 ||
                       item.title.en.toLowerCase().indexOf(q) !== -1 ||
                       item.summary.zh.toLowerCase().indexOf(q) !== -1 ||
                       item.summary.en.toLowerCase().indexOf(q) !== -1 ||
                       item.date.zh.indexOf(q) !== -1;
            });
        }
        // 按日期排序（sort字段 YYYYMMDD）
        data.sort(function(a, b) {
            return sortAscending ? a.sort - b.sort : b.sort - a.sort;
        });
        return data;
    }

    function renderList() {
        var html = '', lang = currentLang;
        var filtered = getFilteredData();
        for (var i = 0; i < filtered.length; i++) {
            var item = filtered[i];
            html += '<div class="news-card" data-id="' + item.id + '">';
            if (item.images && item.images[0]) {
                html += '<div class="card-img"><img src="' + item.images[0].src + '" alt="' + item.images[0].caption + '" style="width:100%;height:100%;object-fit:cover;display:block"><div class="img-overlay"></div><div class="card-date">' + item.date[lang] + '</div></div>';
            }
            html += '<div class="card-body"><div class="card-badge">' + item.badge[lang] + '</div><h3>' + item.title[lang] + '</h3><p>' + item.summary[lang] + '</p>';
            html += '<div class="card-footer"><span class="card-source">' + (lang==='zh'?'来源：':'Source: ') + item.source[lang] + '</span><span class="card-readmore">' + i18nData[lang].readMore + '</span></div></div></div>';
        }
        newsGrid.innerHTML = html;
        newsGrid.querySelectorAll('.news-card').forEach(function(c) {
            c.addEventListener('click', function() { window.location.hash = this.getAttribute('data-id'); });
        });
    }

    function updateCount() {
        var total = newsData.length;
        var shown = getFilteredData().length;
        var txt = i18nData[currentLang].count.replace('{n}', total);
        if (shown !== total) txt += ' （显示 ' + shown + ' 条）';
        newsCountEl.textContent = txt;
    }

    function renderDetail(id) {
        var item = null, index = -1;
        for (var i = 0; i < newsData.length; i++) {
            if (newsData[i].id === id) { item = newsData[i]; index = i; break; }
        }
        if (!item) return;
        var lang = currentLang, t = i18nData[lang];
        var content = item.content[lang] || item.content['zh'];
        var html = '<div class="detail-header"><div class="detail-badge">' + item.badge[lang] + '</div><div class="detail-date">' + item.date[lang] + '</div><h1>' + item.title[lang] + '</h1><div class="detail-source">' + t.source + '：<a href="' + item.sourceUrl + '" target="_blank">' + item.source[lang] + '</a></div></div>';
        // Hero图：有真实图片就用第一张
        if (item.images && item.images[0]) {
            html += '<div class="detail-hero-img" style="overflow:hidden"><img src="' + item.images[0].src + '" alt="' + item.images[0].caption + '" style="width:100%;height:100%;object-fit:cover"></div>';
        } else {
            html += '<div class="detail-hero-img" style="background:' + item.imgGradient + '"><div class="img-visual"></div></div>';
        }
        // 正文
        html += '<div class="detail-body">';
        if (content) {
            var imgIdx = 0;
            for (var ci = 0; ci < content.length; ci++) {
                var b = content[ci];
                if (b.type === 'p') html += '<p>' + b.text + '</p>';
                else if (b.type === 'h2') html += '<h2>' + b.text + '</h2>';
                else if (b.type === 'ul') { html += '<ul>'; for (var ui = 0; ui < b.items.length; ui++) html += '<li>' + b.items[ui] + '</li>'; html += '</ul>'; }
                else if (b.type === 'highlight') html += '<div class="highlight-box">' + b.text + '</div>';
                else if (b.type === 'img') {
                    var imgData = item.images && item.images[imgIdx] ? item.images[imgIdx] : null;
                    if (imgData) {
                        html += '<div class="img-inline" style="overflow:hidden"><img src="' + imgData.src + '" alt="' + (imgData.caption||'') + '" style="width:100%;height:100%;object-fit:cover;display:block">' + (imgData.caption ? '<div class="img-caption">' + imgData.caption + '</div>' : '') + '</div>';
                    } else {
                        html += '<div class="img-inline" style="background:' + item.imgGradient + '"><div class="img-visual" style="font-size:2.5rem">' + b.text + '</div></div>';
                    }
                    imgIdx++;
                }
            }
        }
        html += '</div>';
        detailContent.innerHTML = html;

        var navHtml = '';
        if (index - 1 >= 0) {
            var n = newsData[index - 1];
            navHtml += '<button class="detail-nav-btn" onclick="window.location.hash=\'' + n.id + '\'"><span class="nav-arrow">←</span><div><div class="nav-text">' + t.prev + '</div><div class="nav-title">' + n.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        if (index + 1 < newsData.length) {
            var p = newsData[index + 1];
            navHtml += '<button class="detail-nav-btn next" onclick="window.location.hash=\'' + p.id + '\'"><span class="nav-arrow">→</span><div><div class="nav-text">' + t.next + '</div><div class="nav-title">' + p.title[lang] + '</div></div></button>';
        } else { navHtml += '<div></div>'; }
        detailNav.innerHTML = navHtml;

        listView.style.display = 'none';
        detailView.classList.add('active');
        window.scrollTo({ top: 0 });
    }

    window.doAdminLogin = function() {
        var u = document.getElementById('adminUserInput').value;
        var p = document.getElementById('adminPassInput').value;
        var errEl = document.getElementById('adminLoginError');
        var xhr = new XMLHttpRequest();
        xhr.open('POST', API_BASE_URL + '/api/auth', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onload = function() {
            if (xhr.status === 200) {
                var r = JSON.parse(xhr.responseText);
                adminToken = r.token;
                adminUser = r.username;
                safeSet('so-admin-token', adminToken);
                safeSet('so-admin-user', adminUser);
                showAdminPanel();
            } else {
                errEl.textContent = '用户名或密码错误';
                errEl.style.display = 'block';
            }
        };
        xhr.onerror = function() { errEl.textContent = '无法连接服务器'; errEl.style.display = 'block'; };
        xhr.send(JSON.stringify({username:u,password:p}));
    };

        safeSet('so-admin-token', '');

        document.getElementById('adminOverlay').classList.remove('show');

    window.adminRefreshNewsList = function() {
        var el = document.getElementById('adminNewsList');
        if (!el) return;
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_BASE_URL + '/api/news', true);
        xhr.onload = function() {
            if (xhr.status !== 200) { el.innerHTML = '<div class="admin-error" style="display:block">加载失败</div>'; return; }
            var list = JSON.parse(xhr.responseText);
            if (!list || list.length === 0) {
                el.innerHTML = '<p style="color:#5a7a9a;text-align:center;padding:20px">暂无新闻</p>';
                return;
            }
            var html = '<table class="admin-table"><tr><th>ID</th><th>标题</th><th>日期</th><th>排序</th><th style="width:120px">操作</th></tr>';
            list.forEach(function(item) {
                html += '<tr><td>' + item.id + '</td><td>' + escapeHtml(item.title_zh||'') + '</td><td>' + (item.date_zh||'') + '</td><td>' + (item.sort||0) + '</td>' +
                    '<td><button class="admin-btn secondary small" onclick="adminEditNews(' + item.id + ')">编辑</button> ' +
                    '<button class="admin-btn danger small" onclick="adminDeleteNews(' + item.id + ')">删除</button></td></tr>';
            });
            html += '</table>';
            el.innerHTML = html;
        };
        xhr.send();
    };

    function adminApi(method, path, body, cb) {
        var xhr = new XMLHttpRequest();
        xhr.open(method, API_BASE_URL + path, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('Authorization', 'Bearer ' + adminToken);
        xhr.onload = function() {
            var r = {};
            try { r = JSON.parse(xhr.responseText); } catch(e) {}
            if (cb) cb(xhr.status, r);
        };
        xhr.onerror = function() { if (cb) cb(0, {error:'网络错误'}); };
        xhr.send(body ? JSON.stringify(body) : null);
    }

    function escapeHtml(s) {
        return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.adminSaveNews = function() {
        var data = collectNewsForm();
        adminApi('POST', '/api/news', data, function(status, r) {
            if (status === 201 || status === 200) {
                window.showAdminPanel();
                loadNewsFromAPI();  // 刷新前端显示
            } else {
                var errEl = document.getElementById('adminFormError');
                if (errEl) { errEl.textContent = r.error || '保存失败'; errEl.style.display = 'block'; }
            }
        });
    };

    window.adminUpdateNews = function(id) {
        var data = collectNewsForm();
        adminApi('PUT', '/api/news/' + id, data, function(status, r) {
            if (status === 200) {
                window.showAdminPanel();
                loadNewsFromAPI();
            } else {
                var errEl = document.getElementById('adminFormError');
                if (errEl) { errEl.textContent = r.error || '保存失败'; errEl.style.display = 'block'; }
            }
        });
    };

    window.adminDeleteNews = function(id) {
        if (!confirm('确认删除这条新闻？')) return;
        adminApi('DELETE', '/api/news/' + id, null, function(status) {
            if (status === 200) {
                adminRefreshNewsList();
                loadNewsFromAPI();
            }
        });
    };
    window.showAdminLogin = showAdminLogin;
})();
</script>
<div class="admin-overlay" id="adminOverlay"></div>
<script>setTimeout(showAdminLogin, 100);</script>
</body>
</html>
